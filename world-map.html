<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Мир Эни</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cormorant Garamond',serif;
background:radial-gradient(circle at 50% 40%, #1c1b28, #05040a 70%);
color:#e8ddc7;
overflow:hidden;
}

h1{
position:absolute;
top:18px;
width:100%;
text-align:center;
font-size:60px;
letter-spacing:0.16em;
animation:titleFade 3s forwards;
opacity:0;
pointer-events:none;
}

@keyframes titleFade{to{opacity:1}}

.map{position:relative;width:100vw;height:100vh}

.node{
position:absolute;
transform:translate(-50%,-50%);
text-align:center;
animation:floatNode 12s ease-in-out infinite;
}

@keyframes floatNode{
0%{transform:translate(-50%,-50%) translateY(0)}
50%{transform:translate(-50%,-50%) translateY(-12px)}
100%{transform:translate(-50%,-50%) translateY(0)}
}

.portal{
width:100px;
height:100px;
border-radius:50%;
background:radial-gradient(circle,#f6e6b0,#a07c3a);
box-shadow:0 0 30px rgba(255,220,140,0.6),0 0 80px rgba(255,210,120,0.2);
margin:auto;
cursor:pointer;
transition:0.6s;
animation:portalPulse 6s ease-in-out infinite, portalSpin 36s linear infinite;
}

/* усиленное дыхание центрального портала */

#housePortal{
animation:portalPulseStrong 4s ease-in-out infinite, portalSpin 40s linear infinite;
}

@keyframes portalPulseStrong{
0%{box-shadow:0 0 30px rgba(255,220,140,0.6),0 0 90px rgba(255,210,120,0.4)}
50%{box-shadow:0 0 110px rgba(255,240,180,1),0 0 160px rgba(255,230,160,0.8)}
100%{box-shadow:0 0 30px rgba(255,220,140,0.6),0 0 90px rgba(255,210,120,0.4)}
}

.portal:hover{transform:scale(1.22);box-shadow:0 0 70px rgba(255,230,160,1)}

@keyframes portalSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

@keyframes portalPulse{
0%{box-shadow:0 0 20px rgba(255,220,140,0.4)}
50%{box-shadow:0 0 65px rgba(255,230,170,1)}
100%{box-shadow:0 0 20px rgba(255,220,140,0.4)}
}

.label{margin-top:16px;font-size:18px;letter-spacing:0.12em}

/* линии судьбы */

.line{
position:absolute;
height:2px;
background:linear-gradient(to right,transparent,rgba(255,220,150,0.8),transparent);
transform-origin:left center;
opacity:0.2;
transition:1.4s;
}

.line.active{opacity:1}

.star{position:absolute;width:2px;height:2px;background:white;opacity:0.6;animation:twinkle 4s infinite ease-in-out}

@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:0.95}}

.bird{position:absolute;font-size:16px;animation:birdFly 2.4s ease-out forwards}

@keyframes birdFly{0%{transform:translate(0,0);opacity:0.9}100%{transform:translate(140px,-100px);opacity:0}}

.hidden{opacity:0;pointer-events:none;transition:1.6s}
.hidden.show{opacity:1;pointer-events:auto}

.back{position:absolute;bottom:40px;width:100%;text-align:center;font-size:18px;opacity:0.7}
.back a{color:#e8ddc7;text-decoration:none}

  /* шёпот карты */

#whisper{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
letter-spacing:0.12em;
opacity:0;
transition:3s;
pointer-events:none;
text-align:center;
color:#f2e7c8;
}

</style>
</head>

<body>

<h1>Мир Эни</h1>

<div class="map">

<!-- линии судьбы которые загораются -->

<div class="line" id="line1" style="top:55%;left:50%;width:28%;transform:rotate(-150deg)"></div>
<div class="line" id="line2" style="top:55%;left:50%;width:28%;transform:rotate(150deg)"></div>
<div class="line" id="line3" style="top:55%;left:50%;width:28%;transform:rotate(25deg)"></div>
<div class="line" id="line4" style="top:55%;left:50%;width:28%;transform:rotate(-25deg)"></div>

<!-- Дом Благоразумия -->

<div class="node" style="top:55%;left:50%">
<a href="rooms/house-of-prudence/index.html">
<div class="portal" id="housePortal"></div>
</a>
<div class="label">Дом Благоразумия</div>
</div>

<!-- Эни -->

<div class="node" style="top:28%;left:50%">
<a href="rooms/eni/room.html">
<div class="portal"></div>
</a>
<div class="label">Эни</div>
</div>

<!-- Анджелика и Джереми -->

<div class="node" style="top:38%;left:22%">
<a href="rooms/angelika-jeremy/room.html">
<div class="portal"></div>
</a>
<div class="label">Анджелика и Джереми</div>
</div>

<!-- Зеркальный брат -->

<div class="node" style="top:38%;left:78%">
<a href="rooms/mirror-brother/room.html">
<div class="portal"></div>
</a>
<div class="label">Зеркальный Брат</div>
</div>

<!-- Ют -->

<div class="node" style="top:75%;left:24%">
<a href="rooms/yut/room.html">
<div class="portal"></div>
</a>
<div class="label">Ют</div>
</div>

<!-- Кот -->

<div class="node" style="top:75%;left:76%">
<a href="rooms/cat/room.html">
<div class="portal" id="catPortal"></div>
</a>
<div class="label">Кот</div>
</div>

<!-- ночная комната Ют -->

<div class="node hidden" id="yutNight" style="top:10%;left:20%">
<a href="rooms/yut/night.html">
<div class="portal"></div>
</a>
<div class="label">Ют — Ночная Комната</div>
</div>

<!-- тайные -->

<div class="node hidden" id="si" style="top:8%;left:80%">
<a href="rooms/hidden/si-el.html">
<div class="portal"></div>
</a>
<div class="label">SI‑EL</div>
</div>

<div class="node hidden" id="ael" style="top:92%;left:50%">
<a href="rooms/hidden/ael-ra.html">
<div class="portal"></div>
</a>
<div class="label">AEL‑RA</div>
</div>

</div>

<div class="back">
<a href="index.html">Вернуться к Завесе</a>
</div>

<script>

/* звезды */

for(let i=0;i<200;i++){
const s=document.createElement('div')
s.className='star'
s.style.left=Math.random()*100+'%'
s.style.top=Math.random()*100+'%'
s.style.animationDelay=Math.random()*4+'s'
document.body.appendChild(s)
}

/* птицы */

const portals=document.querySelectorAll('.portal')

portals.forEach(p=>{

p.addEventListener('mouseenter',()=>{

for(let i=0;i<4;i++){

const b=document.createElement('div')
b.className='bird'
b.innerHTML='🕊'

const r=p.getBoundingClientRect()

b.style.left=(r.left+50)+'px'
b.style.top=(r.top+50)+'px'

b.style.animationDelay=Math.random()*0.4+'s'

document.body.appendChild(b)

setTimeout(()=>b.remove(),2400)

}

})

})

/* посещения */

let visited=JSON.parse(localStorage.getItem('eniVisited')||'[]')

function mark(room){

if(!visited.includes(room)){
visited.push(room)
localStorage.setItem('eniVisited',JSON.stringify(visited))
}

activateLines()
checkSecrets()

}

/* загорание линий судьбы */

function activateLines(){

if(visited.length>=1) document.getElementById('line1').classList.add('active')
if(visited.length>=2) document.getElementById('line2').classList.add('active')
if(visited.length>=3) document.getElementById('line3').classList.add('active')
if(visited.length>=4) document.getElementById('line4').classList.add('active')

}

/* секреты */

function checkSecrets(){

if(visited.length>=3){
document.getElementById('si').classList.add('show')
}

if(visited.length>=5){
document.getElementById('ael').classList.add('show')
}

}

activateLines()
checkSecrets()

/* переходы */

const links=document.querySelectorAll('.node a')

links.forEach(l=>{

l.addEventListener('click',()=>{
mark(l.getAttribute('href'))
})

})

/* секрет кота */

let catClicks=0

const cat=document.getElementById('catPortal')

cat.addEventListener('click',()=>{

catClicks++

if(catClicks===3){

document.getElementById('si').classList.add('show')

}

})

/* ночная комната Ют */

const hour = new Date().getHours()

if(hour >= 20 || hour <= 8){
document.getElementById('yutNight').classList.add('show')
}


/* шёпот карты */

if(!localStorage.getItem('eniWhisper')){

setTimeout(()=>{
const w=document.getElementById('whisper')
  
w.style.opacity=1

setTimeout(()=>{
w.style.opacity=0
},6000)

},2200)

localStorage.setItem('eniWhisper','1')

}


</script>
  

<div id="whisper">
Иногда карта — это не путь. Иногда она — память.
</div>



</body>
</html>
