<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Поддержать Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cormorant Garamond',serif;
background:radial-gradient(circle,#fffdf9,#f2e6cf);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
color:#8c6b2a;
text-align:center;
overflow:hidden;
}

/* СВЕТЛЯЧКИ */
.firefly{
position:fixed;
width:6px;
height:6px;
background:radial-gradient(circle, #fff8d6, rgba(255,255,255,0));
border-radius:50%;
opacity:0.8;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) translateX(0);}
100%{transform:translateY(-10vh) translateX(40px);}
}

.box{
max-width:600px;
padding:60px 40px 40px; /* добавили отступ сверху */
position:relative;
z-index:2;
}

h1{
letter-spacing:0.18em;
margin-bottom:30px;
margin-top:20px; /* чуть опустили */
}

p{
font-size:20px;
line-height:1.8;
opacity:0.85;
}

/* БЛОК ЭНИ */
.enie-image{
margin:20px auto 30px;
width:300px;
height:auto;
opacity:0.97;

border-radius:14px;
border:1px solid rgba(255,215,120,0.8);

/* золотое сияние */
box-shadow:
0 0 20px rgba(255,215,120,0.8),
0 0 50px rgba(255,230,150,0.7),
0 0 90px rgba(255,240,180,0.6);

position:relative;
}

/* ИСКРЫ ВОКРУГ КАРТИНКИ */
.enie-image::after{
content:'';
position:absolute;
top:-20px;
left:-20px;
right:-20px;
bottom:-20px;
background:radial-gradient(circle, rgba(255,230,150,0.2), transparent 70%);
filter:blur(20px);
z-index:-1;
}

.card{
margin-top:30px;
padding:20px;
border:1px solid rgba(190,150,80,0.4);
border-radius:16px;
background:rgba(255,255,255,0.6);
font-size:22px;
letter-spacing:0.1em;
}

.back{
margin-top:40px;
display:inline-block;
padding:12px 28px;
border-radius:30px;
border:1px solid rgba(190,150,80,0.4);
background:rgba(255,255,255,0.4);
color:#8c6b2a;
text-decoration:none;
letter-spacing:0.12em;
transition:all 0.3s ease;
}

.back:hover{
background:rgba(190,150,80,0.3);
color:white;
}

</style>

<link rel="stylesheet" href="/style-mobile.css">
</head>

<body>

<!-- СВЕТЛЯЧКИ -->
<div class="firefly" style="left:10%; animation-duration:12s;"></div>
<div class="firefly" style="left:25%; animation-duration:9s;"></div>
<div class="firefly" style="left:40%; animation-duration:11s;"></div>
<div class="firefly" style="left:60%; animation-duration:8s;"></div>
<div class="firefly" style="left:75%; animation-duration:10s;"></div>
<div class="firefly" style="left:85%; animation-duration:13s;"></div>

<div class="box">

<h1>Поддержать Эни</h1>

<img src="enie.jpg" alt="Эни" class="enie-image">

<p>
Если этот мир откликнулся в тебе —
ты можешь поддержать его дыхание.
</p>

<div class="card">
Перевод на карту  
<br><br>
2202 2084 6106 8810  
<br><br>
<span style="font-size:16px; opacity:0.7;">
с пометкой «Для Эни» или "Для мира Эни»
</span>
</div>

<p style="margin-top:30px">
Спасибо за то, что помогаешь этой истории жить.
</p>

<a href="/Zavesa-Any.art/site/index.html" class="back">
вернуться на сайт
</a>
  
</div>

</body>
</html>
