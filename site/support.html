<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Поддержать Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cormorant Garamond',serif;
background:radial-gradient(circle,#fffdf9,#f2e6cf);
display:flex;
align-items:flex-start; /* изменили */
justify-content:center;
min-height:100vh;
color:#8c6b2a;
text-align:center;

/* теперь можно скроллить */
overflow-y:auto;
overflow-x:hidden;
}

/* СВЕТЛЯЧКИ */
.firefly{
position:fixed;
width:8px;
height:8px;
background:radial-gradient(circle, #fff6c0, rgba(255,255,255,0));
border-radius:50%;
opacity:0.95;
pointer-events:none;

box-shadow:
0 0 10px rgba(255,230,150,0.9),
0 0 25px rgba(255,240,180,0.7);

animation:float linear infinite;
}

/* разные движения */
@keyframes float{
0%{transform:translateY(110vh) translateX(0);}
100%{transform:translateY(-10vh) translateX(60px);}
}

.box{
max-width:600px;
padding:80px 40px 80px; /* больше воздуха */
position:relative;
z-index:2;
}

h1{
letter-spacing:0.18em;
margin-bottom:30px;
margin-top:30px;
}

p{
font-size:20px;
line-height:1.8;
opacity:0.9;
}

/* ЭНИ */
.enie-image{
margin:30px auto 40px;
width:300px;
height:auto;
opacity:0.98;

border-radius:14px;
border:1px solid rgba(255,215,120,0.9);

box-shadow:
0 0 25px rgba(255,215,120,0.9),
0 0 60px rgba(255,230,150,0.8),
0 0 120px rgba(255,240,180,0.6);
}

.card{
margin-top:40px;
padding:24px;
border:1px solid rgba(190,150,80,0.4);
border-radius:16px;
background:rgba(255,255,255,0.65);
font-size:22px;
letter-spacing:0.1em;
}

.back{
margin-top:50px;
display:inline-block;
padding:14px 30px;
border-radius:30px;
border:1px solid rgba(190,150,80,0.4);
background:rgba(255,255,255,0.4);
color:#8c6b2a;
text-decoration:none;
letter-spacing:0.12em;
transition:all 0.3s ease;
}

.back:hover{
background:rgba(190,150,80,0.3);
color:white;
}

</style>

<link rel="stylesheet" href="/style-mobile.css">
</head>

<body>

<!-- МНОГО СВЕТЛЯЧКОВ -->
<div class="firefly" style="left:5%; animation-duration:12s;"></div>
<div class="firefly" style="left:15%; animation-duration:9s;"></div>
<div class="firefly" style="left:25%; animation-duration:11s;"></div>
<div class="firefly" style="left:35%; animation-duration:8s;"></div>
<div class="firefly" style="left:45%; animation-duration:10s;"></div>
<div class="firefly" style="left:55%; animation-duration:13s;"></div>
<div class="firefly" style="left:65%; animation-duration:7s;"></div>
<div class="firefly" style="left:75%; animation-duration:14s;"></div>
<div class="firefly" style="left:85%; animation-duration:9s;"></div>
<div class="firefly" style="left:95%; animation-duration:12s;"></div>

<div class="box">

<h1>Поддержать Эни</h1>

<img src="enie.jpg" alt="Эни" class="enie-image">

<p>
Если этот мир откликнулся в тебе —
ты можешь поддержать его дыхание.
</p>

<div class="card">
Перевод на карту  
<br><br>
2202 2084 6106 8810  
<br><br>
<span style="font-size:16px; opacity:0.7;">
с пометкой «Для Эни» или "Для мира Эни»
</span>
</div>

<p style="margin-top:30px">
Спасибо за то, что помогаешь этой истории жить.
</p>

<a href="/Zavesa-Any.art/site/index.html" class="back">
вернуться на сайт
</a>
  
</div>

</body>
</html>
