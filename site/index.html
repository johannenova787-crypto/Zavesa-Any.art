<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Эни — Акт I</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
font-family:'Cormorant Garamond',serif;
color:#5a4723;
overflow-x:hidden;
scroll-behavior:smooth;

background:radial-gradient(circle at 50% 0%,#fffdf9,#f2e6cf);
background-size:120% 120%;
animation:goldenBreath 18s ease-in-out infinite;
}

@keyframes goldenBreath{
0%{background-position:50% 0%;}
50%{background-position:52% 6%;}
100%{background-position:50% 0%;}
}

body{
opacity:0;
animation:fadeIn 2.5s ease forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 20px;
}

.title{
font-size:clamp(64px,6vw,96px);
letter-spacing:0.14em;
font-weight:600;
color:#c6a048;
text-shadow:0 0 30px rgba(255,215,150,0.4);
margin-bottom:20px;
}

.subtitle{
font-size:24px;
letter-spacing:0.25em;
opacity:0.7;
margin-bottom:80px;
}

/* Слайдер */

.slider{
width:420px;
aspect-ratio:2/3;
position:relative;
perspective:1200px;
margin-bottom:60px;
}

.slide{
width:100%;
height:100%;
position:absolute;
border-radius:28px;
overflow:hidden;
box-shadow:0 30px 80px rgba(180,140,60,0.35);
backface-visibility:hidden;
transform-origin:left;
transition:transform 2s ease,opacity 2s ease;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.slide.active{z-index:2;}

.slide.flip{
transform:rotateY(-180deg);
opacity:0;
}

/* КНОПКИ */

.buttons{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
}

.button{
font-size:18px;
letter-spacing:0.18em;
padding:16px 46px;
border-radius:60px;
border:1px solid rgba(190,150,80,0.5);
background:rgba(255,248,230,0.9);
color:#8c6b2a;
cursor:pointer;
transition:.6s;
}

.button:hover{
transform:scale(1.07);
box-shadow:0 0 40px rgba(255,220,160,0.6);
}

/* О КНИГЕ */

.about-book{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:80px 20px;
background:linear-gradient(to bottom,#f2e6cf,#fffdf9);
}

.about-inner{
max-width:900px;
text-align:center;
}

.about-title{
font-size:48px;
letter-spacing:.15em;
margin-bottom:40px;
color:#b98a2d;
}

.about-book p{
font-size:22px;
line-height:1.9;
margin-bottom:30px;
opacity:.85;
}

/* PDF */

.pdf-room{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:10000;

background:radial-gradient(circle at center,#fffdf9,#f2e6cf);

display:flex;
align-items:center;
justify-content:center;

opacity:0;
pointer-events:none;

transition:opacity 1.2s ease;
}

.pdf-room.open{
opacity:1;
pointer-events:auto;
}

.pdf-room iframe{
width:80%;
height:90%;
border:none;
border-radius:18px;
box-shadow:0 40px 120px rgba(180,140,60,0.4);
}

.close-pdf{
position:absolute;
top:30px;
right:40px;
padding:10px 22px;
border-radius:40px;
border:1px solid rgba(190,150,80,.5);
background:rgba(255,248,230,.9);
cursor:pointer;
}

/* ПОРТАЛ */

.portal{
position:absolute;
left:50%;
top:78%;
width:160px;
height:160px;
border-radius:50%;

transform:translate(-50%,-50%);
opacity:0;
pointer-events:none;

transition:opacity 1.5s ease;

z-index:20;
}

.portal.open{
opacity:1;
pointer-events:auto;
}

.portal-ring{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:
radial-gradient(circle,
rgba(255,230,150,0.9) 0%,
rgba(255,220,150,0.4) 40%,
transparent 70%);
box-shadow:
0 0 60px rgba(255,220,140,0.8),
0 0 140px rgba(255,220,140,0.4);
}

.portal-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
letter-spacing:.2em;
}

/* ЧАСТИЦЫ СТРАНИЦ */

.page-particle{
position:absolute;
width:10px;
height:14px;

background:
linear-gradient(to bottom,
rgba(255,240,200,0.9),
rgba(255,210,120,0.3));

border-radius:2px;

animation:pageRise 3s ease forwards;
}

@keyframes pageRise{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-200px) rotate(360deg);
opacity:0;
}

}

/* ПТИЦЫ */

.bird{
position:absolute;
width:80px;
height:60px;
pointer-events:none;
animation:birdFly 9s ease-out forwards;
}

.bird svg{
width:100%;
height:100%;
fill:rgba(255,220,150,0.95);
filter:
drop-shadow(0 0 10px rgba(255,220,150,0.9))
drop-shadow(0 0 25px rgba(255,220,150,0.5));
}

@keyframes birdFly{

0%{
transform:translateY(0) scale(.7);
opacity:1;
}

100%{
transform:translateY(-580px) scale(.9);
opacity:0;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="title">Эни</div>
<div class="subtitle">Акт I — Сквозь Тени</div>

<div class="slider" id="slider">

<div class="slide active"><img src="../covers/cover1.jpg"></div>
<div class="slide"><img src="../covers/cover2.jpg"></div>
<div class="slide"><img src="../covers/cover3.jpg"></div>
<div class="slide"><img src="../covers/cover4.jpg"></div>
<div class="slide"><img src="../covers/cover5.jpg"></div>
<div class="slide"><img src="../covers/cover6.jpg"></div>

</div>

<div class="portal" id="portal">
<div class="portal-ring"></div>
<div class="portal-text">Переступить Завесу</div>
</div>

<div class="buttons">

<button class="button" onclick="scrollToAbout()">О книге</button>

<button class="button" onclick="goDeeper()">Нырнуть глубже</button>

<button class="button" onclick="openExcerpt()">Бесплатный отрывок</button>

</div>

</section>

<section class="about-book" id="about">

<div class="about-inner">

<div class="about-title">О книге</div>

<p>
«Эни. Акт I — Сквозь Тени» — история о границе между светом и тем,
что остаётся за пределами видимого.
</p>

<p>
Здесь тени — не враги. Они память, глубина, отражение.
</p>

</div>

</section>

<div class="pdf-room" id="pdfRoom">

<button class="close-pdf" onclick="closeExcerpt()">Закрыть</button>

<iframe id="pdfFrame"></iframe>

</div>

<script>

/* СЛАЙДЕР */

const slides=document.querySelectorAll(".slide");

let current=0;
let isAnimating=false;

function nextSlide(){

if(isAnimating)return;

isAnimating=true;

const currentSlide=slides[current];
const nextIndex=(current+1)%slides.length;

const upcomingSlide=slides[nextIndex];

currentSlide.classList.add("flip");

setTimeout(()=>{

currentSlide.classList.remove("active","flip");

upcomingSlide.classList.add("active");

current=nextIndex;

isAnimating=false;

setTimeout(nextSlide,7000);

},2000);

}

setTimeout(nextSlide,7000);

/* СКРОЛЛ */

function scrollToAbout(){

document
.getElementById("about")
.scrollIntoView({behavior:"smooth"});

}

/* НЫРНУТЬ ГЛУБЖЕ */

function goDeeper(){

createPageParticles();

setTimeout(createBirds,400);

setTimeout(()=>{

document
.getElementById("portal")
.classList.add("open");

},4200);

}

/* ПЕРЕХОД ПОРТАЛА */

document
.getElementById("portal")
.onclick=()=>{

window.location.href="../rooms/";

};

/* ПТИЦЫ */

function createBirds(){

const slider=document.getElementById("slider");

const birdSVG=`
<svg viewBox="0 0 200 120">
<path d="M10 70 Q70 10 100 55 Q130 10 190 70 Q140 55 100 85 Q60 55 10 70 Z"/>
</svg>
`;

for(let i=0;i<12;i++){

const bird=document.createElement("div");

bird.className="bird";

bird.innerHTML=birdSVG;

bird.style.left=(200+(i-6)*55)+"px";
bird.style.bottom="70px";

bird.style.animationDelay=(i*0.35)+"s";

slider.appendChild(bird);

setTimeout(()=>bird.remove(),9000);

}

}

/* ЧАСТИЦЫ */

function createPageParticles(){

const slider=document.getElementById("slider");

for(let i=0;i<20;i++){

const p=document.createElement("div");

p.className="page-particle";

p.style.left=Math.random()*100+"%";

p.style.bottom="40px";

slider.appendChild(p);

setTimeout(()=>p.remove(),3000);

}

}

/* PDF */

function openExcerpt(){

const room=document.getElementById("pdfRoom");

const frame=document.getElementById("pdfFrame");

frame.src="excerpt.pdf";

room.classList.add("open");

}

function closeExcerpt(){

const room=document.getElementById("pdfRoom");

const frame=document.getElementById("pdfFrame");

room.classList.remove("open");

frame.src="";

}

</script>

</body>
</html>
