
<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Эни — Акт I</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

html, body {
margin: 0;
padding: 0;
font-family: 'Cormorant Garamond', serif;
color: #5a4723;
overflow-x: hidden;
scroll-behavior: smooth;
background: radial-gradient(circle at 50% 0%, #fffdf9, #f2e6cf);
background-size: 120% 120%;
animation: goldenBreath 18s ease-in-out infinite;
}

@keyframes goldenBreath {

0% {background-position: 50% 0%;}
50% {background-position: 52% 6%;}
100% {background-position: 50% 0%;}

}

body {
opacity: 0;
animation: fadeIn 2.5s ease forwards;
}

@keyframes fadeIn {
to {opacity: 1;}
}

.hero {
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
padding: 40px 20px;
}

.title {
font-size: clamp(64px, 6vw, 96px);
letter-spacing: 0.14em;
font-weight: 600;
color: #c6a048;
text-shadow: 0 0 30px rgba(255,215,150,0.4);
margin-bottom: 20px;
}

.subtitle {
font-size: 24px;
letter-spacing: 0.25em;
opacity: 0.7;
margin-bottom: 80px;
}

.slider {
width: 420px;
aspect-ratio: 3/4;
position: relative;
perspective: 1200px;
margin-bottom: 60px;
}

.slide {
width: 100%;
height: 100%;
position: absolute;
border-radius: 28px;
overflow: hidden;
box-shadow: 0 30px 80px rgba(180,140,60,0.35);
backface-visibility: hidden;
transform-origin: left;
transform-style: preserve-3d;
background:#f4ead4;
transition: transform 2s ease, opacity 2s ease;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
object-position:center;
}

.slide.active {
z-index: 2;
}

.slide.flip {
transform: rotateY(-180deg);
opacity: 0;
}

.buttons {
display: flex;
gap: 40px;
flex-wrap: wrap;
justify-content: center;
}

.button {
font-size: 18px;
letter-spacing: 0.18em;
padding: 16px 46px;
border-radius: 60px;
border: 1px solid rgba(190,150,80,0.5);
background: rgba(255,248,230,0.9);
color: #8c6b2a;
cursor: pointer;
transition: all 0.6s ease;
}

.button:hover {
transform: scale(1.07);
box-shadow: 0 0 40px rgba(255,220,160,0.6);
}

.about-book {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 80px 20px;
background: linear-gradient(to bottom, #f2e6cf, #fffdf9);
}

.about-inner {
max-width: 900px;
text-align: center;
}

.about-title {
font-size: 48px;
letter-spacing: 0.15em;
margin-bottom: 40px;
color: #b98a2d;
}

.about-book p {
font-size: 22px;
line-height: 1.9;
margin-bottom: 30px;
opacity: 0.85;
}

.about-meta {
margin-top: 50px;
font-size: 18px;
opacity: 0.7;
line-height: 1.8;
}

.excerpt-section {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
background: linear-gradient(to bottom, #fffdf9, #f7ecd8);
padding: 120px 20px;
}

.excerpt-inner {
max-width: 800px;
text-align: center;
position: relative;
}

.excerpt-title {
font-size: 48px;
letter-spacing: 0.15em;
margin-bottom: 50px;
color: #b98a2d;
}

.excerpt-toggle {
font-size: 18px;
letter-spacing: 0.2em;
padding: 14px 40px;
border-radius: 60px;
border: 1px solid rgba(190,150,80,0.5);
background: rgba(255,248,230,0.9);
color: #8c6b2a;
cursor: pointer;
transition: all 0.6s ease;
}

.excerpt-toggle:hover {
box-shadow: 0 0 30px rgba(255,215,140,0.6);
transform: scale(1.05);
}

.excerpt-wrapper {
max-height: 0;
overflow: hidden;
transition: max-height 1.8s ease, opacity 1.4s ease;
opacity: 0;
margin-top: 0;
}

.excerpt-wrapper.open {
max-height: 800px;
opacity: 1;
margin-top: 60px;
}

.excerpt-text {
font-size: 22px;
line-height: 1.9;
padding: 40px;
border-radius: 20px;
background: rgba(255,255,255,0.6);
box-shadow: 0 0 40px rgba(210,170,90,0.2);
transform-origin: top center;
transition: transform 1.5s ease;
}

.excerpt-wrapper.open .excerpt-text {
transform: rotateX(3deg);
}

</style>

</head>

<body>

<section class="hero">

<div class="title">Эни</div>

<div class="subtitle">
Акт I — Сквозь Тени
</div>

<div class="slider">

<div class="slide active">
<img src="images/covers/cover1.jpg">
</div>

<div class="slide">
<img src="images/covers/cover2.jpg">
</div>

<div class="slide">
<img src="images/covers/cover3.jpg">
</div>

<div class="slide">
<img src="images/covers/cover4.jpg">
</div>

<div class="slide">
<img src="images/covers/cover5.jpg">
</div>

<div class="slide">
<img src="images/covers/cover6.jpg">
</div>

</div>

</section>

</body>
</html>
