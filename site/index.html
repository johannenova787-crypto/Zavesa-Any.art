<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Эни — Акт I</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
font-family:'Cormorant Garamond',serif;
color:#5a4723;
overflow-x:hidden;
scroll-behavior:smooth;

background:radial-gradient(circle at 50% 0%,#fffdf9,#f2e6cf);
background-size:120% 120%;
animation:goldenBreath 18s ease-in-out infinite;
}

@keyframes goldenBreath{
0%{background-position:50% 0%;}
50%{background-position:52% 6%;}
100%{background-position:50% 0%;}
}

body{
opacity:0;
animation:fadeIn 2.5s ease forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 20px;
}

.title{
font-size:clamp(64px,6vw,96px);
letter-spacing:0.14em;
font-weight:600;
color:#c6a048;

text-shadow:
0 0 30px rgba(255,215,150,0.4),
0 0 60px rgba(255,215,150,0.2);

margin-bottom:20px;
}

.subtitle{
font-size:24px;
letter-spacing:0.25em;
opacity:0.7;
margin-bottom:80px;
}

.slider{
width:420px;
aspect-ratio:2/3;
position:relative;
perspective:1200px;
margin-bottom:60px;
}

.slide{
width:100%;
height:100%;
position:absolute;
border-radius:28px;
overflow:hidden;

box-shadow:0 30px 80px rgba(180,140,60,0.35);

backface-visibility:hidden;
transform-origin:left;
transform-style:preserve-3d;

transition:transform 2s ease,opacity 2s ease;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
object-position:center;
display:block;
}

.slide.active{
z-index:2;
}

.slide.flip{
transform:rotateY(-180deg);
opacity:0;
}

/* ПОРТАЛ */

.portal{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.6);
width:260px;
height:260px;
border-radius:50%;
opacity:0;
pointer-events:none;
transition:opacity 1.6s ease, transform 1.6s ease;
}

.portal.open{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

.portal-ring{
position:absolute;
width:100%;
height:100%;
border-radius:50%;

background:
radial-gradient(circle,
rgba(255,230,150,0.9) 0%,
rgba(255,220,150,0.4) 40%,
transparent 70%);

box-shadow:
0 0 60px rgba(255,220,140,0.8),
0 0 140px rgba(255,220,140,0.4);

animation: portalPulse 6s ease-in-out infinite;
}

.portal-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:18px;
letter-spacing:0.2em;
color:#8c6b2a;
}

@keyframes portalPulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

/* частицы страниц */

.page-particle{
position:absolute;
width:10px;
height:14px;

background:
linear-gradient(to bottom,
rgba(255,240,200,0.9),
rgba(255,210,120,0.3));

border-radius:2px;

animation:pageRise 3s ease forwards;
}

@keyframes pageRise{
0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(-200px) rotate(360deg);
opacity:0;
}
}

/* Кнопки */

.buttons{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
}

.button{

font-size:18px;
letter-spacing:0.18em;
padding:16px 46px;

border-radius:60px;

border:1px solid rgba(190,150,80,0.5);
background:rgba(255,248,230,0.9);

color:#8c6b2a;

cursor:pointer;

transition:all .6s ease;
}

.button:hover{
transform:scale(1.07);
box-shadow:0 0 40px rgba(255,220,160,0.6);
}

</style>

</head>

<body>

<section class="hero">

<div class="title">Эни</div>

<div class="subtitle">
Акт I — Сквозь Тени
</div>

<div class="slider" id="slider">

<div class="slide active">
<img src="../covers/cover1.jpg">
</div>

<div class="slide">
<img src="../covers/cover2.jpg">
</div>

<div class="slide">
<img src="../covers/cover3.jpg">
</div>

<div class="slide">
<img src="../covers/cover4.jpg">
</div>

<div class="slide">
<img src="../covers/cover5.jpg">
</div>

<div class="slide">
<img src="../covers/cover6.jpg">
</div>

</div>

<!-- ПОРТАЛ -->

<div class="portal" id="portal">
<div class="portal-ring"></div>
<div class="portal-text">Вход</div>
</div>

<div class="buttons">

<button class="button" onclick="scrollToAbout()">
О книге
</button>

<button class="button" onclick="goDeeper()">
Нырнуть глубже
</button>

<button class="button" onclick="goBuy()">
Взять книгу с собой
</button>

</div>

</section>

<script>

const slides=document.querySelectorAll(".slide");

let current=0;
let isAnimating=false;

function nextSlide(){

if(isAnimating)return;

isAnimating=true;

const currentSlide=slides[current];
const nextIndex=(current+1)%slides.length;
const upcomingSlide=slides[nextIndex];

currentSlide.classList.add("flip");

setTimeout(()=>{

currentSlide.classList.remove("active","flip");
upcomingSlide.classList.add("active");

current=nextIndex;
isAnimating=false;

setTimeout(nextSlide,7000);

},2000);

}

setTimeout(nextSlide,7000);

function scrollToAbout(){
document.getElementById("about").scrollIntoView({behavior:"smooth"});
}

/* НОВЫЙ ВХОД В МИР */

function goDeeper(){

createPageParticles();

const portal = document.getElementById("portal");

setTimeout(()=>{
portal.classList.add("open");
},1200);

setTimeout(()=>{
window.location.href="rooms/index.html";
},3000);

}

function createPageParticles(){

const slider = document.getElementById("slider");

for(let i=0;i<20;i++){

const p = document.createElement("div");
p.className="page-particle";

p.style.left=Math.random()*100+"%";
p.style.bottom="40px";

slider.appendChild(p);

setTimeout(()=>p.remove(),3000);

}

}

function goBuy(){
window.location.href="buy.html";
}

</script>

</body>
</html>
