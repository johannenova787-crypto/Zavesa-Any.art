<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Эни — Акт I</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
font-family:'Cormorant Garamond',serif;
color:#5a4723;
overflow-x:hidden;
scroll-behavior:smooth;
background:radial-gradient(circle at 50% 0%,#fffdf9,#f2e6cf);
background-size:120% 120%;
animation:goldenBreath 18s ease-in-out infinite;
}

@keyframes goldenBreath{
0%{background-position:50% 0%;}
50%{background-position:52% 6%;}
100%{background-position:50% 0%;}
}

body{opacity:0;animation:fadeIn 2.5s ease forwards;}
@keyframes fadeIn{to{opacity:1;}}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 20px;
}

.title{
font-size:clamp(64px,6vw,96px);
letter-spacing:0.14em;
font-weight:600;
color:#c6a048;
text-shadow:0 0 30px rgba(255,215,150,0.4),0 0 60px rgba(255,215,150,0.2);
margin-bottom:20px;
}

.subtitle{
font-size:24px;
letter-spacing:0.25em;
opacity:0.7;
margin-bottom:80px;
}

/* СЛАЙДЕР */

.slider{
width:420px;
aspect-ratio:2/3;
position:relative;
perspective:1200px;
margin-bottom:60px;
}

.slide{
width:100%;
height:100%;
position:absolute;
border-radius:28px;
overflow:hidden;
box-shadow:0 30px 80px rgba(180,140,60,0.35);
backface-visibility:hidden;
transform-origin:left;
transform-style:preserve-3d;
transition:transform 2s ease,opacity 2s ease;
}

.slide img{width:100%;height:100%;object-fit:cover;}
.slide.active{z-index:2;}
.slide.flip{transform:rotateY(-180deg);opacity:0;}

/* КНОПКИ */

.buttons{display:flex;gap:40px;flex-wrap:wrap;justify-content:center;}

.button{
font-size:18px;
letter-spacing:0.18em;
padding:16px 46px;
border-radius:60px;
border:1px solid rgba(190,150,80,0.5);
background:rgba(255,248,230,0.9);
color:#8c6b2a;
cursor:pointer;
transition:all .6s ease;
}

.button:hover{transform:scale(1.07);box-shadow:0 0 40px rgba(255,220,160,0.6);} 

/* ПОРТАЛ (СНАЧАЛА СКРЫТ) */

.portal{
position:absolute;
left:50%;
top:78%;
width:180px;
height:180px;
transform:translate(-50%,-50%);
cursor:pointer;
opacity:0;
pointer-events:none;
transition:opacity 1.6s ease;
}

.portal.visible{
opacity:1;
pointer-events:auto;
}

.portal-ring{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:radial-gradient(circle,rgba(255,230,150,0.9) 0%,rgba(255,220,150,0.4) 40%,transparent 70%);
box-shadow:0 0 60px rgba(255,220,140,0.8),0 0 120px rgba(255,220,140,0.4);
animation:portalPulse 5s ease-in-out infinite;
}

.portal-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:18px;
letter-spacing:0.2em;
color:#8c6b2a;
text-align:center;
}

@keyframes portalPulse{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);} }

/* ПТИЦЫ */

.bird{
position:absolute;
width:90px;
height:70px;
pointer-events:none;
animation:birdFly 8s ease-out forwards;
}

.bird svg{width:100%;height:100%;fill:rgba(255,220,150,0.95);
filter:drop-shadow(0 0 12px rgba(255,220,150,0.9));
animation:wingFlap .9s ease-in-out infinite;}

@keyframes wingFlap{0%{transform:scaleY(1);}50%{transform:scaleY(.75);}100%{transform:scaleY(1);} }

@keyframes birdFly{
0%{transform:translateY(0) scale(.6);opacity:1;}
40%{transform:translateY(-180px) scale(1);} 
70%{transform:translateY(-360px) scale(1.1);} 
100%{transform:translateY(-600px) scale(.9);opacity:0;}
}

/* ЧАСТИЦЫ СТРАНИЦ */

.page-particle{
position:absolute;
width:10px;height:14px;
background:linear-gradient(to bottom,rgba(255,240,200,0.9),rgba(255,210,120,0.3));
border-radius:2px;
animation:pageRise 3s ease forwards;
}

@keyframes pageRise{
0%{transform:translateY(0) rotate(0deg);opacity:1;}
100%{transform:translateY(-200px) rotate(360deg);opacity:0;}
}

/* ЗОЛОТАЯ ПЫЛЬ */

.gold-particle{
position:absolute;width:6px;height:6px;border-radius:50%;
background:radial-gradient(circle,gold 0%,transparent 70%);
animation:goldFloat 2s ease forwards;
}

@keyframes goldFloat{
from{transform:translateY(0);opacity:1}
to{transform:translateY(-120px);opacity:0}
}

/* СВЕТ КУРСОРА */

.cursor-glow{
position:fixed;width:12px;height:12px;pointer-events:none;border-radius:50%;
background:radial-gradient(circle,rgba(255,220,140,.8) 0%,rgba(255,220,140,0) 70%);
transform:translate(-50%,-50%);
animation:glowFade .8s ease-out forwards;z-index:9999;
}

@keyframes glowFade{from{opacity:.9;transform:translate(-50%,-50%) scale(1);}to{opacity:0;transform:translate(-50%,-50%) scale(2.5);} }

/* PDF */

.pdf-room{
position:fixed;top:0;left:0;width:100%;height:100%;
background:radial-gradient(circle at center,#fffdf9,#f2e6cf);
display:flex;align-items:center;justify-content:center;
opacity:0;pointer-events:none;transform:scale(.96);
transition:opacity 1.2s ease,transform 1.2s ease;z-index:10000;
}

.pdf-room.open{opacity:1;pointer-events:auto;transform:scale(1);} 

.close-pdf{
position:absolute;top:30px;right:40px;font-size:16px;padding:10px 22px;border-radius:40px;
border:1px solid rgba(190,150,80,.5);background:rgba(255,248,230,.9);cursor:pointer;color:#8c6b2a;
}

.pdf-room iframe{width:80%;height:90%;border:none;border-radius:18px;box-shadow:0 40px 120px rgba(180,140,60,0.4);} 

</style>
</head>

<body>

<section class="hero">

<div class="title">Эни</div>
<div class="subtitle">Акт I — Сквозь Тени</div>

<div class="slider" id="slider">

<div class="slide active"><img src="../covers/cover1.jpg"></div>
<div class="slide"><img src="../covers/cover2.jpg"></div>
<div class="slide"><img src="../covers/cover3.jpg"></div>
<div class="slide"><img src="../covers/cover4.jpg"></div>
<div class="slide"><img src="../covers/cover5.jpg"></div>
<div class="slide"><img src="../covers/cover6.jpg"></div>

</div>

<!-- ПОРТАЛ ПОЯВЛЯЕТСЯ ПОСЛЕ ПТИЦ -->
<div class="portal" id="portal" onclick="enterPortal()">
<div class="portal-ring"></div>
<div class="portal-text">Переступить<br>Завесу</div>
</div>

<div class="buttons">
<button class="button" onclick="scrollToAbout()">О книге</button>
<button class="button" onclick="goDeeper()">Нырнуть глубже</button>
<button class="button" onclick="goBuy()">Взять книгу с собой</button>
</div>

</section>

<!-- PDF -->
<div class="pdf-room" id="pdfRoom">
<button class="close-pdf" onclick="closeExcerpt()">✕ Закрыть</button>
<iframe id="pdfFrame"></iframe>
</div>

<script>

/* СЛАЙДЕР */

const slides=document.querySelectorAll('.slide');
let current=0;
let anim=false;

function nextSlide(){
if(anim)return;
anim=true;

const c=slides[current];
const next=(current+1)%slides.length;
const n=slides[next];

c.classList.add('flip');

setTimeout(()=>{

c.classList.remove('active','flip');
n.classList.add('active');
current=next;
anim=false;

setTimeout(nextSlide,7000);

},2000);

}

setTimeout(nextSlide,7000);

/* КНОПКА НЫРНУТЬ ГЛУБЖЕ */

function goDeeper(){

createGoldDust();
createPageParticles();

setTimeout(createBirds,300);

/* портал появляется только после полета птиц */

setTimeout(()=>{

const portal=document.getElementById('portal');
portal.classList.add('visible');

},4200);

}

/* ПОРТАЛ */

function enterPortal(){

window.location.href='../rooms/';

}

/* ПТИЦЫ */

function createBirds(){

const slider=document.getElementById('slider');
const rect=slider.getBoundingClientRect();
const center=rect.left+rect.width/2;

const birdSVG=`<svg viewBox="0 0 200 120"><path d="M10 70 Q70 10 100 55 Q130 10 190 70 Q140 55 100 85 Q60 55 10 70 Z"/></svg>`;

for(let i=0;i<14;i++){

const bird=document.createElement('div');
bird.className='bird';
bird.innerHTML=birdSVG;

bird.style.left=(center+(i-7)*60)+'px';
bird.style.bottom='120px';

const scale=0.6+Math.random()*0.7;
bird.style.transform='scale('+scale+')';

bird.style.animationDelay=(i*0.3)+'s';

document.body.appendChild(bird);

setTimeout(()=>bird.remove(),9000);

}

}

/* ЧАСТИЦЫ СТРАНИЦ */

function createPageParticles(){

for(let i=0;i<20;i++){

const p=document.createElement('div');
p.className='page-particle';

p.style.left=Math.random()*100+'%';
p.style.bottom='120px';

document.body.appendChild(p);

setTimeout(()=>p.remove(),3000);

}

}

/* ЗОЛОТАЯ ПЫЛЬ */

function createGoldDust(){

for(let i=0;i<15;i++){

const dust=document.createElement('div');
dust.className='gold-particle';

dust.style.left=Math.random()*window.innerWidth+'px';
dust.style.top=(window.innerHeight*0.7)+'px';

document.body.appendChild(dust);

setTimeout(()=>dust.remove(),2000);

}

}

/* СВЕТ КУРСОРА */

document.addEventListener('mousemove',e=>{

const g=document.createElement('div');
g.className='cursor-glow';

g.style.left=e.clientX+'px';
g.style.top=e.clientY+'px';

document.body.appendChild(g);

setTimeout(()=>g.remove(),800);

});

/* PDF */

function openExcerpt(){
const room=document.getElementById('pdfRoom');
const frame=document.getElementById('pdfFrame');
frame.src='../excerpt/excerpt.pdf';
room.classList.add('open');
}

function closeExcerpt(){
const room=document.getElementById('pdfRoom');
const frame=document.getElementById('pdfFrame');
room.classList.remove('open');
frame.src='';
}

function goBuy(){window.location.href='buy.html';}

function scrollToAbout(){document.getElementById('about')?.scrollIntoView({behavior:'smooth'});} 

</script>

</body>
</html>
