<script>

/* свет курсора */
const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* кнопка */
function openPortal(){

const door = document.getElementById("door");
const rect = door.getBoundingClientRect();

for(let i=0;i<16;i++){

const bird=document.createElementNS(
"http://www.w3.org/2000/svg","svg");

bird.setAttribute("viewBox","0 0 24 24");
bird.classList.add("bird");

bird.style.left=(rect.left + rect.width/2)+"px";
bird.style.top=(rect.top + rect.height/2)+"px";

bird.style.animationDelay=(Math.random()*2)+"s";

bird.innerHTML=
'<path d="M2 12c4-4 8-4 10 0 2-4 6-4 10 0-4-2-8-2-10 2-2-4-6-4-10-2z"/>';

document.body.appendChild(bird);

}

setTimeout(()=>{
window.location.href="https://johannenova787-crypto.github.io/Zavesa-Any.art/index.html";
},4200);

}

/* лёгкие фоновые птицы */
const door=document.getElementById("door");

for(let i=0;i<6;i++){

const bird=document.createElementNS(
"http://www.w3.org/2000/svg","svg");

bird.setAttribute("viewBox","0 0 24 24");
bird.classList.add("bird");

const rect=door.getBoundingClientRect();

bird.style.left=(rect.left + rect.width/2)+"px";
bird.style.top=(rect.top + rect.height/2)+"px";

bird.style.animationDuration=(8 + Math.random()*4)+"s";

bird.innerHTML =
'<path d="M2 12c4-4 8-4 10 0 2-4 6-4 10 0-4-2-8-2-10 2-2-4-6-4-10-2z"/>';

document.body.appendChild(bird);

}

</script>
