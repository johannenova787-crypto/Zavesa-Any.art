<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Мир Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cormorant Garamond',serif;
background:radial-gradient(circle at 50% 40%, #1c1b28, #05040a 70%);
color:#e8ddc7;
overflow:hidden;
}

h1{
position:absolute;
top:18px;
width:100%;
text-align:center;
font-size:60px;
letter-spacing:0.16em;
animation:titleFade 3s forwards;
opacity:0;
pointer-events:none;
}

@keyframes titleFade{to{opacity:1}}

.map{
position:relative;
width:100vw;
height:100vh;
}

/* ✦ СТАБИЛЬНЫЕ УЗЛЫ */

.node{
position:absolute;
top:0;
left:0;
transform:translate(-50%,-50%);
text-align:center;
}

/* ✦ ПОРТАЛ — без конфликта transform */

.portal{
width:100px;
height:100px;
border-radius:50%;
background:radial-gradient(circle,#f6e6b0,#a07c3a);
box-shadow:0 0 30px rgba(255,220,140,0.6),0 0 80px rgba(255,210,120,0.2);
margin:auto;
cursor:pointer;
transition:0.6s;

transform-origin:center;

/* вращение вынесено в отдельный слой */
animation:portalPulse 6s ease-in-out infinite;
}

/* отдельный слой вращения */
.portal::before{
content:"";
position:absolute;
inset:0;
border-radius:50%;
animation:portalSpin 36s linear infinite;
}

/* hover больше НЕ ломает позицию */
.portal:hover{
filter:brightness(1.25);
box-shadow:0 0 70px rgba(255,230,160,1);
}

@keyframes portalSpin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

@keyframes portalPulse{
0%{box-shadow:0 0 20px rgba(255,220,140,0.4)}
50%{box-shadow:0 0 65px rgba(255,230,170,1)}
100%{box-shadow:0 0 20px rgba(255,220,140,0.4)}
}

/* центральный портал усилен */
#housePortal{
animation:portalPulseStrong 4s ease-in-out infinite;
}

@keyframes portalPulseStrong{
0%{box-shadow:0 0 30px rgba(255,220,140,0.6),0 0 90px rgba(255,210,120,0.4)}
50%{box-shadow:0 0 110px rgba(255,240,180,1),0 0 160px rgba(255,230,160,0.8)}
100%{box-shadow:0 0 30px rgba(255,220,140,0.6),0 0 90px rgba(255,210,120,0.4)}
}

.label{
margin-top:16px;
font-size:18px;
letter-spacing:0.12em
}

/* линии */

.line{
position:absolute;
height:2px;
background:linear-gradient(to right,transparent,rgba(255,220,150,0.8),transparent);
transform-origin:left center;
opacity:0.2;
transition:1.4s;
}

.line.active{opacity:1}

/* звезды */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:0.6;
animation:twinkle 4s infinite ease-in-out
}

@keyframes twinkle{
0%,100%{opacity:0.2}
50%{opacity:0.95}
}

.hidden{opacity:0;pointer-events:none;transition:1.6s}
.hidden.show{opacity:1;pointer-events:auto}

.back{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
font-size:18px;
opacity:0.7
}

.back a{
color:#e8ddc7;
text-decoration:none
}

#whisper, #worldMemory{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
pointer-events:none;
opacity:0;
transition:3s;
}

#whisper{font-size:28px}
#worldMemory{
font-size:34px;
text-shadow:0 0 30px rgba(255,230,160,0.6);
}

</style>
</head>

<body>

<h1>Мир Эни</h1>

<div class="map">

<!-- линии -->
<div class="line" style="top:55%;left:50%;width:28%;transform:rotate(-150deg)"></div>
<div class="line" style="top:55%;left:50%;width:28%;transform:rotate(150deg)"></div>
<div class="line" style="top:55%;left:50%;width:28%;transform:rotate(25deg)"></div>
<div class="line" style="top:55%;left:50%;width:28%;transform:rotate(-25deg)"></div>

<!-- центр -->
<div class="node" style="top:55%;left:50%">
<a href="rooms/house-of-prudence/index.html">
<div class="portal" id="housePortal"></div>
</a>
<div class="label">Дом Благоразумия</div>
</div>

<!-- остальные узлы -->
<div class="node" style="top:28%;left:50%">
<a href="rooms/eni/room.html"><div class="portal"></div></a>
<div class="label">Эни</div>
</div>

<div class="node" style="top:38%;left:22%">
<a href="rooms/angelika-jeremy/room.html"><div class="portal"></div></a>
<div class="label">Анджелика и Джереми</div>
</div>

<div class="node" style="top:38%;left:78%">
<a href="rooms/mirror-brother/room.html"><div class="portal"></div></a>
<div class="label">Зеркальный Брат</div>
</div>

<div class="node" style="top:75%;left:24%">
<a href="rooms/yut/room.html"><div class="portal"></div></a>
<div class="label">Ют</div>
</div>

<div class="node" style="top:75%;left:76%">
<a href="rooms/cat/room.html"><div class="portal"></div></a>
<div class="label">Кот</div>
</div>

</div>

<div class="back">
<a href="index.html">Вернуться к Завесе</a>
</div>

<script>

/* ✦ ЗВЕЗДЫ (стабильные, без утечек) */

for(let i=0;i<200;i++){
const s=document.createElement('div')
s.className='star'
s.style.left=Math.random()*100+'%'
s.style.top=Math.random()*100+'%'
s.style.animationDelay=Math.random()*4+'s'
document.body.appendChild(s)
}

</script>

<div id="whisper">Иногда карта — это не путь. Иногда она — память.</div>
<div id="worldMemory">Мир запомнил, что ты был здесь.</div>

</body>
</html>
