
<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Мир Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cormorant Garamond',serif;
background:radial-gradient(circle at 50% 40%, #1c1b28, #05040a 70%);
color:#e8ddc7;
overflow:hidden;
}

/* РАСШИРЕННЫЙ, НО ЦЕНТРИРОВАННЫЙ МИР */

.page-center{
position:relative;
width:140vw;
height:120vh;
margin-left:-20vw;
overflow:hidden;
}

/* КАРТА ДЫШИТ ГОРИЗОНТАЛЬНО */

.map{
position:absolute;
inset:0;
transform:scale(1.15,1);
transform-origin:center;
left:-7.5%;
}

h1{
position:absolute;
top:18px;
width:100%;
text-align:center;
font-size:60px;
letter-spacing:0.16em;
animation:titleFade 3s forwards;
opacity:0;
pointer-events:none;
}

@keyframes titleFade{to{opacity:1}}

.node{
position:absolute;
transform:translate(-50%,-50%);
text-align:center;
animation:floatNode 12s ease-in-out infinite;
}

@keyframes floatNode{
0%{transform:translate(-50%,-50%) translateY(0)}
50%{transform:translate(-50%,-50%) translateY(-12px)}
100%{transform:translate(-50%,-50%) translateY(0)}
}

.portal{
width:100px;
height:100px;
border-radius:50%;
margin:auto;
cursor:pointer;
position:relative;
transform:translateZ(0);
}

.portal::before{
content:"";
position:absolute;
inset:0;
border-radius:50%;
background:radial-gradient(circle,#f6e6b0,#a07c3a);
box-shadow:0 0 30px rgba(255,220,140,0.6),0 0 80px rgba(255,210,120,0.2);
animation:portalPulse 6s ease-in-out infinite, portalSpin 36s linear infinite;
}

#housePortal::before{
animation:portalPulseStrong 4s ease-in-out infinite, portalSpin 40s linear infinite;
}

@keyframes portalSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

@keyframes portalPulse{
0%{box-shadow:0 0 20px rgba(255,220,140,0.4)}
50%{box-shadow:0 0 65px rgba(255,230,170,1)}
100%{box-shadow:0 0 20px rgba(255,220,140,0.4)}
}

@keyframes portalPulseStrong{
0%{box-shadow:0 0 30px rgba(255,220,140,0.6)}
50%{box-shadow:0 0 120px rgba(255,240,180,1)}
100%{box-shadow:0 0 30px rgba(255,220,140,0.6)}
}

.label{margin-top:16px;font-size:18px;letter-spacing:0.12em}

/* линии */

.line{
position:absolute;
height:2px;
background:linear-gradient(to right,transparent,rgba(255,220,150,0.8),transparent);
transform-origin:left center;
opacity:0.2;
transition:1.4s;
}

.line.active{opacity:1}

/* скрытые */

.hidden{opacity:0;pointer-events:none;transition:1.6s}
.hidden.show{opacity:1;pointer-events:auto}

/* текст */

#whisper, #worldMemory{
position:absolute;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
pointer-events:none;
}

#whisper{
top:45%;
font-size:28px;
opacity:0;
transition:3s;
}

#worldMemory{
top:50%;
font-size:34px;
opacity:0;
transition:3s;
}

/* назад */

.back{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
}

</style>
</head>

<body>

<div class="page-center">

<h1>Мир Эни</h1>

<div class="map">

<!-- линии -->

<div class="line" id="line1" style="top:55%;left:50%;width:28%;transform:rotate(-150deg)"></div>
<div class="line" id="line2" style="top:55%;left:50%;width:28%;transform:rotate(150deg)"></div>
<div class="line" id="line3" style="top:55%;left:50%;width:28%;transform:rotate(25deg)"></div>
<div class="line" id="line4" style="top:55%;left:50%;width:28%;transform:rotate(-25deg)"></div>

<!-- центр -->

<div class="node" style="top:55%;left:50%">
<a href="rooms/house-of-prudence/index.html">
<div class="portal" id="housePortal"></div>
</a>
<div class="label">Дом Благоразумия</div>
</div>

<!-- верх -->

<div class="node" style="top:28%;left:50%">
<a href="rooms/eni/room.html">
<div class="portal"></div>
</a>
<div class="label">Эни</div>
</div>

<!-- луны (расширены) -->

<div class="node" style="top:38%;left:18%">
<a href="rooms/angelika-jeremy/room.html">
<div class="portal"></div>
</a>
<div class="label">Анджелика и Джереми</div>
</div>

<div class="node" style="top:38%;left:82%">
<a href="rooms/mirror-brother/room.html">
<div class="portal"></div>
</a>
<div class="label">Зеркальный Брат</div>
</div>

<!-- низ -->

<div class="node" style="top:75%;left:20%">
<a href="rooms/yut/room.html">
<div class="portal"></div>
</a>
<div class="label">Ют</div>
</div>

<div class="node" style="top:75%;left:80%">
<a href="rooms/cat/room.html">
<div class="portal" id="catPortal"></div>
</a>
<div class="label">Кот</div>
</div>

<!-- скрытые -->

<div class="node hidden" id="yutNight" style="top:10%;left:20%">
<a href="rooms/yut/night.html"><div class="portal"></div></a>
<div class="label">Ют — Ночная Комната</div>
</div>

<div class="node hidden" id="si" style="top:8%;left:80%">
<a href="rooms/hidden/si-el.html"><div class="portal"></div></a>
<div class="label">SI-EL</div>
</div>

<div class="node hidden" id="ael" style="top:85%;left:50%">
<a href="rooms/hidden/ael-ra.html"><div class="portal"></div></a>
<div class="label">AEL-RA</div>
</div>

</div>

<div class="back">
<a href="index.html">Вернуться к Завесе</a>
</div>

<div id="whisper">
Иногда карта — это не путь. Иногда она — память.
</div>

<div id="worldMemory">
Мир запомнил, что ты был здесь.
</div>

</div>

<script>

let visited=JSON.parse(localStorage.getItem('eniVisited')||'[]')

function mark(room){
if(!visited.includes(room)){
visited.push(room)
localStorage.setItem('eniVisited',JSON.stringify(visited))
}
activateLines()
checkSecrets()
}

function activateLines(){
if(visited.length>=1) line1.classList.add('active')
if(visited.length>=2) line2.classList.add('active')
if(visited.length>=3) line3.classList.add('active')
if(visited.length>=4) line4.classList.add('active')
}

function checkSecrets(){
if(visited.length>=3) si.classList.add('show')
if(visited.length>=5) ael.classList.add('show')
}

document.querySelectorAll('.node a').forEach(l=>{
l.onclick=()=>mark(l.getAttribute('href'))
})

/* ночь */

const hour=new Date().getHours()
if(hour>=20||hour<=8){
yutNight.classList.add('show')
}

/* шёпот */

if(!localStorage.getItem('eniWhisper')){
setTimeout(()=>{
whisper.style.opacity=1
setTimeout(()=>whisper.style.opacity=0,6000)
},2000)
localStorage.setItem('eniWhisper','1')
}

/* пробуждение */

if(visited.length>=6 && !localStorage.getItem('eniWorldAwakened')){
setTimeout(()=>{
worldMemory.style.opacity=1
setTimeout(()=>worldMemory.style.opacity=0,6000)
},1200)
localStorage.setItem('eniWorldAwakened','1')
}

activateLines()
checkSecrets()

</script>

</body>
</html>
