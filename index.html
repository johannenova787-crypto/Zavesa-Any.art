
<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Завеса в Мир Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:radial-gradient(circle at top,#fff8e8,#efd4a0);
overflow:hidden;
font-family:'Cormorant Garamond',serif;
}

canvas{
position:absolute;
inset:0;
z-index:1;
}
</style>

</head>

<body>

<canvas id="particles"></canvas>

<script>

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

ctx.globalCompositeOperation="lighter";

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

let dust=[];
let sparks=[];
let stars=[];

for(let i=0;i<240;i++){

dust.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.3+0.4,
v:Math.random()*0.2+0.05,
a:Math.random()*Math.PI*2
});

}

for(let i=0;i<70;i++){

sparks.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+0.7,
v:Math.random()*0.14+0.04,
a:Math.random()*Math.PI*2,
pulse:Math.random()*Math.PI*2
});

}

for(let i=0;i<12;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
pulse:Math.random()*Math.PI*2
});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

dust.forEach(p=>{

p.x+=Math.cos(p.a)*p.v;
p.y+=Math.sin(p.a)*p.v;

ctx.shadowBlur=10;
ctx.shadowColor="rgba(255,200,100,0.9)";

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,215,110,1)";
ctx.fill();

});

ctx.shadowBlur=0;
ctx.shadowColor="transparent";

sparks.forEach(s=>{

s.x+=Math.cos(s.a)*s.v;
s.y+=Math.sin(s.a)*s.v;

s.pulse+=0.04;

const glow=1+Math.sin(s.pulse)*0.7;

const g=ctx.createRadialGradient(
s.x,s.y,0,
s.x,s.y,s.r*glow*7
);

g.addColorStop(0,"rgba(255,255,235,1)");
g.addColorStop(0.25,"rgba(255,230,150,1)");
g.addColorStop(0.6,"rgba(255,200,90,0.9)");
g.addColorStop(1,"rgba(255,170,60,0)");

ctx.beginPath();
ctx.arc(s.x,s.y,s.r*glow*7,0,Math.PI*2);
ctx.fillStyle=g;
ctx.fill();

});

stars.forEach(st=>{

st.pulse+=0.05;

const glow=1+Math.sin(st.pulse)*1.2;

const g=ctx.createRadialGradient(
st.x,st.y,0,
st.x,st.y,34*glow
);

g.addColorStop(0,"rgba(255,255,245,1)");
g.addColorStop(0.18,"rgba(255,235,160,1)");
g.addColorStop(0.5,"rgba(255,205,100,0.9)");
g.addColorStop(1,"rgba(255,170,60,0)");

ctx.beginPath();
ctx.arc(st.x,st.y,34*glow,0,Math.PI*2);
ctx.fillStyle=g;
ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
