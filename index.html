
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Завеса в Мир Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:radial-gradient(circle at 50% 0%,#fffef8 0%,#f7e9c9 55%,#efdcb3 100%);
}

canvas{
position:absolute;
inset:0;
z-index:1;
}

.portal{
position:relative;
z-index:2;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
transition:opacity 1.5s ease;
}

.title{
font-family:'Cinzel',serif;
font-size:72px;
letter-spacing:0.18em;
color:#d6b45a;
text-shadow:
0 0 18px rgba(255,235,180,0.95),
0 0 42px rgba(255,210,140,0.65);
margin-bottom:26px;
}

.subtitle{
font-family:'Cormorant Garamond',serif;
font-size:28px;
color:#b79a63;
margin-bottom:50px;
}

.open{
font-family:'Cinzel',serif;
font-size:18px;
letter-spacing:0.13em;
padding:14px 38px;
color:#cfa437;
background:rgba(255,255,255,0.2);
border:1px solid rgba(212,175,55,0.6);
border-radius:40px;
cursor:pointer;
}

.open:hover{
background:rgba(212,175,55,0.35);
color:white;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="portal" id="portal">

<div class="title">Завеса в Мир Эни</div>

<div class="subtitle">
путь звучит и раскрывается где бы ты ни был...
</div>

<button class="open" onclick="openVeil()">ОТКРЫТЬ</button>

</div>

<script>

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let dust=[];
let fireflies=[];
let stars=[];

for(let i=0;i<520;i++){
dust.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.8+0.5,
tx:0,
ty:0
});
}

for(let i=0;i<25;i++){
fireflies.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
pulse:Math.random()*Math.PI*2
});
}

for(let i=0;i<10;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
pulse:Math.random()*Math.PI*2
});
}

let forming=false;
let breathing=false;

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

dust.forEach(p=>{

if(!forming){
p.x+=(Math.random()-0.5)*0.35;
p.y+=(Math.random()-0.5)*0.35;
}else{
p.x+=(p.tx-p.x)*0.02;
p.y+=(p.ty-p.y)*0.02;
}

if(breathing){
let pulse=1+Math.sin(Date.now()*0.002)*0.6;
p.r=1.7*pulse;
}

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,230,170,0.95)";
ctx.fill();

});

fireflies.forEach(f=>{

f.pulse+=0.03;
let glow=1+Math.sin(f.pulse)*0.6;

const g=ctx.createRadialGradient(
f.x,f.y,0,
f.x,f.y,30*glow
);

g.addColorStop(0,"rgba(255,255,240,0.9)");
g.addColorStop(1,"rgba(210,180,110,0)");

ctx.beginPath();
ctx.arc(f.x,f.y,30*glow,0,Math.PI*2);
ctx.fillStyle=g;
ctx.fill();

});

stars.forEach(s=>{

s.pulse+=0.03;
let glow=1+Math.sin(s.pulse)*0.7;

ctx.beginPath();
ctx.arc(s.x,s.y,2.3*glow,0,Math.PI*2);
ctx.fillStyle="rgba(240,245,255,0.9)";
ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

function formText(){

const temp=document.createElement("canvas");
const tctx=temp.getContext("2d");

temp.width=900;
temp.height=400;

tctx.fillStyle="white";
tctx.font="bold 150px Cinzel";
tctx.textAlign="center";
tctx.textBaseline="middle";

tctx.fillText("JOANNA NOVA",450,200);

const data=tctx.getImageData(0,0,900,400).data;

let points=[];

for(let y=0;y<400;y+=4){
for(let x=0;x<900;x+=4){

let i=(y*900+x)*4;

if(data[i+3]>150){

points.push({
x:x+canvas.width/2-450,
y:y+canvas.height/2-200
});

}

}
}

points=points.slice(0,dust.length);

dust.forEach((p,i)=>{
if(points[i]){
p.tx=points[i].x;
p.ty=points[i].y;
}
});

forming=true;

setTimeout(()=>{
breathing=true;
},4000);

}

function openVeil(){

document.getElementById("portal").style.opacity=0;

setTimeout(()=>{
formText();
},1000);

setTimeout(()=>{
window.location.href="johanna.html";
},13000);

}

</script>

</body>
</html>
