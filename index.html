
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Завеса в Мир Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:radial-gradient(circle at 50% 0%,#fffef8 0%,#f7e9c9 55%,#efdcb3 100%);
}

canvas{
position:absolute;
inset:0;
z-index:1;
}

.portal{
position:relative;
z-index:2;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.title{
font-family:'Cinzel',serif;
font-size:74px;
letter-spacing:0.17em;
color:#d6b45a;
text-shadow:
0 0 18px rgba(255,235,180,0.95),
0 0 42px rgba(255,210,140,0.65);
margin-bottom:26px;
animation:fadeTitle 2.2s ease forwards;
}

.subtitle{
font-family:'Cormorant Garamond',serif;
font-size:30px;
letter-spacing:0.08em;
color:#b79a63;
opacity:0;
margin-bottom:55px;
animation:fadeSubtitle 2.4s ease forwards;
animation-delay:1.6s;
}

.open{
font-family:'Cinzel',serif;
font-size:18px;
letter-spacing:0.13em;
padding:15px 40px;
color:#cfa437;
background:rgba(255,255,255,0.18);
border:1px solid rgba(212,175,55,0.6);
border-radius:42px;
backdrop-filter:blur(6px);
cursor:pointer;
transition:all .45s ease;
opacity:0;
animation:fadeSubtitle 2.6s ease forwards;
animation-delay:2.4s;
}

.open:hover{
color:#fff;
background:rgba(212,175,55,0.35);
box-shadow:0 0 20px rgba(212,175,55,0.65);
}

@keyframes fadeTitle{
from{opacity:0; transform:translateY(-12px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes fadeSubtitle{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.veil{
position:fixed;
top:0;
width:50%;
height:100%;
z-index:4;
pointer-events:none;
background:radial-gradient(circle at center,
rgba(255,245,210,0.95) 0%,
rgba(255,235,190,0.85) 40%,
rgba(255,220,170,0.6) 70%,
rgba(255,210,150,0.2) 100%);
box-shadow:0 0 80px rgba(255,220,150,0.9);
transition:transform 2.6s cubic-bezier(.7,0,.2,1);
}

.veil.left{left:0;}
.veil.right{right:0;}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="portal">

<div class="title">Завеса в Мир Эни</div>

<div class="subtitle">
путь звучит и раскрывается где бы ты ни был...
</div>

<button class="open" onclick="openVeil()">ОТКРЫТЬ</button>

</div>

<script>

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let dust=[];
let fireflies=[];
let stars=[];

for(let i=0;i<220;i++){
dust.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.3+0.4,
v:Math.random()*0.3,
a:Math.random()*Math.PI*2
});
}

for(let i=0;i<30;i++){
fireflies.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2.4+1.2,
v:Math.random()*0.2,
a:Math.random()*Math.PI*2,
pulse:Math.random()*Math.PI*2
});
}

for(let i=0;i<10;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
pulse:Math.random()*Math.PI*2
});
}

let forming=false;

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* золотая пыль */

dust.forEach(p=>{

if(!forming){
p.x+=Math.cos(p.a)*p.v;
p.y+=Math.sin(p.a)*p.v;
}else{
p.x+=(p.tx-p.x)*0.05;
p.y+=(p.ty-p.y)*0.05;
}

if(p.glow){
p.glow+=0.08;
let pulse=1+Math.sin(p.glow)*0.4;
p.r=1.4*pulse;
}

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(250,225,160,0.9)";
ctx.fill();

});

/* светлячки */

fireflies.forEach(f=>{

if(!forming){
f.x+=Math.cos(f.a)*f.v;
f.y+=Math.sin(f.a)*f.v;
}

f.pulse+=0.05;
let glow=1+Math.sin(f.pulse)*0.5;

const g=ctx.createRadialGradient(
f.x,f.y,0,
f.x,f.y,f.r*glow*7
);

g.addColorStop(0,"rgba(255,250,235,0.95)");
g.addColorStop(1,"rgba(210,180,110,0)");

ctx.beginPath();
ctx.arc(f.x,f.y,f.r*glow*7,0,Math.PI*2);
ctx.fillStyle=g;
ctx.fill();

});

/* платиновые звезды */

stars.forEach(s=>{

s.pulse+=0.03;
let glow=1+Math.sin(s.pulse)*0.8;

const g=ctx.createRadialGradient(
s.x,s.y,0,
s.x,s.y,26*glow
);

g.addColorStop(0,"rgba(255,255,255,0.95)");
g.addColorStop(1,"rgba(210,220,230,0)");

ctx.beginPath();
ctx.arc(s.x,s.y,26*glow,0,Math.PI*2);
ctx.fillStyle=g;
ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

function formText(){

const temp=document.createElement("canvas");
const tctx=temp.getContext("2d");

temp.width=800;
temp.height=200;

tctx.font="bold 120px Cinzel";
tctx.textAlign="center";
tctx.fillText("JOANNA NOVA",400,130);

const data=tctx.getImageData(0,0,800,200).data;

let points=[];

for(let y=0;y<200;y+=6){
for(let x=0;x<800;x+=6){

let i=(y*800+x)*4;

if(data[i+3]>150){
points.push({
x:x+canvas.width/2-400,
y:y+canvas.height/2-100
});
}

}
}

points=points.slice(0,dust.length);

dust.forEach((p,i)=>{
if(points[i]){
p.tx=points[i].x;
p.ty=points[i].y;
p.glow=Math.random()*Math.PI*2;
}
});

forming=true;

}

function openVeil(){

formText();

setTimeout(()=>{

const left=document.createElement("div");
const right=document.createElement("div");

left.className="veil left";
right.className="veil right";

document.body.appendChild(left);
document.body.appendChild(right);

setTimeout(()=>{
left.style.transform="translateX(-100%)";
right.style.transform="translateX(100%)";
},60);

},1800);

setTimeout(()=>{
window.location.href="johanna.html";
},3600);

}

</script>

</body>
</html>
