
<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Завеса в Мир Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
height:100%;
background:radial-gradient(circle at top,#fff8e8,#efd4a0);
overflow:hidden;
font-family:'Cormorant Garamond',serif;
}

canvas{
position:absolute;
inset:0;
z-index:1;
}

.portal{
position:relative;
z-index:2;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.portal-title{
font-size:72px;
letter-spacing:0.12em;
color:#cfa437;

text-shadow:
0 0 12px rgba(255,210,120,0.8),
0 0 26px rgba(255,190,90,0.5);

margin-bottom:40px;
}

.open-button{

font-size:26px;
letter-spacing:0.15em;
padding:16px 44px;

border-radius:60px;
border:1px solid rgba(200,160,80,0.6);

background:rgba(255,245,215,0.9);
color:#9c7a2f;

cursor:pointer;
transition:all 0.5s ease;
}

.open-button:hover{

transform:scale(1.05);

box-shadow:
0 0 24px rgba(255,220,140,0.7);

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="portal">

<div class="portal-title">
Завеса в Мир Эни
</div>

<button class="open-button">
Открыть
</button>

</div>

<script>

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

ctx.globalCompositeOperation="lighter";

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

resize();
window.addEventListener("resize",resize);

let dust=[];
let sparks=[];
let stars=[];

for(let i=0;i<180;i++){

dust.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.2+0.3,
v:Math.random()*0.15+0.04,
a:Math.random()*Math.PI*2
});

}

for(let i=0;i<40;i++){

sparks.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.6+0.4,
v:Math.random()*0.12+0.04,
a:Math.random()*Math.PI*2,
pulse:Math.random()*Math.PI*2
});

}

for(let i=0;i<6;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
pulse:Math.random()*Math.PI*2
});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

dust.forEach(p=>{

p.x+=Math.cos(p.a)*p.v;
p.y+=Math.sin(p.a)*p.v;

ctx.shadowBlur=6;
ctx.shadowColor="rgba(255,200,100,0.7)";

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,210,110,0.9)";
ctx.fill();

});

ctx.shadowBlur=0;

sparks.forEach(s=>{

s.x+=Math.cos(s.a)*s.v;
s.y+=Math.sin(s.a)*s.v;

s.pulse+=0.04;

const glow=1+Math.sin(s.pulse)*0.5;

const g=ctx.createRadialGradient(
s.x,s.y,0,
s.x,s.y,s.r*glow*4
);

g.addColorStop(0,"rgba(255,255,230,1)");
g.addColorStop(0.35,"rgba(255,220,140,0.9)");
g.addColorStop(1,"rgba(255,180,80,0)");

ctx.beginPath();
ctx.arc(s.x,s.y,s.r*glow*4,0,Math.PI*2);
ctx.fillStyle=g;
ctx.fill();

});

stars.forEach(st=>{

st.pulse+=0.05;

const glow=1+Math.sin(st.pulse)*0.8;

const g=ctx.createRadialGradient(
st.x,st.y,0,
st.x,st.y,18*glow
);

g.addColorStop(0,"rgba(255,255,240,1)");
g.addColorStop(0.3,"rgba(255,230,150,0.9)");
g.addColorStop(1,"rgba(255,190,90,0)");

ctx.beginPath();
ctx.arc(st.x,st.y,18*glow,0,Math.PI*2);
ctx.fillStyle=g;
ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
