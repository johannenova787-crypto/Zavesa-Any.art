
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Завеса в Мир Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:radial-gradient(circle at top,#fffdf5,#f6e7c6);
}

canvas{
position:absolute;
inset:0;
z-index:1;
}

.portal{
position:relative;
z-index:2;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.title{
font-family:'Cinzel',serif;
font-size:74px;
letter-spacing:0.16em;
color:#d4af37;
text-shadow:
0 0 14px rgba(255,220,150,0.9),
0 0 34px rgba(255,200,120,0.55);
margin-bottom:24px;
animation:fadeTitle 2s ease forwards;
}

.subtitle{
font-family:'Cormorant Garamond',serif;
font-size:30px;
letter-spacing:0.08em;
color:#b89b63;
opacity:0;
margin-bottom:60px;
animation:fadeSubtitle 2.5s ease forwards;
animation-delay:1.4s;
}

.open-btn{
font-family:'Cinzel',serif;
font-size:20px;
letter-spacing:0.12em;
padding:16px 38px;
color:#cfa437;
background:rgba(255,255,255,0.15);
border:1px solid rgba(212,175,55,0.6);
border-radius:40px;
backdrop-filter:blur(6px);
cursor:pointer;
transition:all 0.4s ease;
animation:fadeSubtitle 2.5s ease forwards;
animation-delay:2.2s;
opacity:0;
}

.open-btn:hover{
color:#fff;
background:rgba(212,175,55,0.35);
box-shadow:0 0 18px rgba(212,175,55,0.6);
}
