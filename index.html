
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Завеса в Мир Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:radial-gradient(circle at 50% 0%,#fffef8 0%,#f7e9c9 55%,#efdcb3 100%);
}

canvas{
position:absolute;
inset:0;
z-index:1;
}

.portal{
position:relative;
z-index:2;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.title{
font-family:'Cinzel',serif;
font-size:74px;
letter-spacing:0.17em;
color:#d6b45a;
text-shadow:
0 0 18px rgba(255,235,180,0.95),
0 0 42px rgba(255,210,140,0.65);
margin-bottom:26px;
animation:fadeTitle 2.2s ease forwards;
}

.subtitle{
font-family:'Cormorant Garamond',serif;
font-size:30px;
letter-spacing:0.08em;
color:#b79a63;
opacity:0;
margin-bottom:55px;
animation:fadeSubtitle 2.4s ease forwards;
animation-delay:1.6s;
}

.open{
font-family:'Cinzel',serif;
font-size:18px;
letter-spacing:0.13em;
padding:15px 40px;
color:#cfa437;
background:rgba(255,255,255,0.18);
border:1px solid rgba(212,175,55,0.6);
border-radius:42px;
backdrop-filter:blur(6px);
cursor:pointer;
transition:all .45s ease;
opacity:0;
animation:fadeSubtitle 2.6s ease forwards;
animation-delay:2.4s;
}

.open:hover{
color:#fff;
background:rgba(212,175,55,0.35);
box-shadow:0 0 20px rgba(212,175,55,0.65);
}

@keyframes fadeTitle{
from{opacity:0; transform:translateY(-12px);} 
to{opacity:1; transform:translateY(0);} }

@keyframes fadeSubtitle{
from{opacity:0; transform:translateY(10px);} 
to{opacity:1; transform:translateY(0);} }

/* световой занавес */
.veil{
position:fixed;
top:0;
</script>
