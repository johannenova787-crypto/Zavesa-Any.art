<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Завеса в Мир Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:radial-gradient(circle at top,#fff7e0,#f0d8a8);
overflow:hidden;
font-family:'Cormorant Garamond',serif;
}

canvas{
position:absolute;
inset:0;
z-index:1;
}
</style>

</head>

<body>

<canvas id="particles"></canvas>

<script>

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

ctx.globalCompositeOperation="lighter";

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

let dust=[];
let sparks=[];
let stars=[];

for(let i=0;i<220;i++){

dust.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.4+0.5,
v:Math.random()*0.2+0.05,
a:Math.random()*Math.PI*2
});

}

for(let i=0;i<60;i++){

sparks.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2.2+0.8,
v:Math.random()*0.15+0.04,
a:Math.random()*Math.PI*2,
pulse:Math.random()*Math.PI*2
});

}

for(let i=0;i<10;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
pulse:Math.random()*Math.PI*2
});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

dust.forEach(p=>{

p.x+=Math.cos(p.a)*p.v;
p.y+=Math.sin(p.a)*p.v;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

ctx.fillStyle="rgba(255,200,80,0.95)";
ctx.shadowColor="rgba(255,180,60,0.8)";
ctx.shadowBlur=6;

ctx.fill();

});

sparks.forEach(s=>{

s.x+=Math.cos(s.a)*s.v;
s.y+=Math.sin(s.a)*s.v;

s.pulse+=0.04;

const glow=1+Math.sin(s.pulse)*0.7;

const g=ctx.createRadialGradient(
s.x,s.y,0,
s.x,s.y,s.r*glow*6
);

g.addColorStop(0,"rgba(255,255,200,1)");
g.addColorStop(0.3,"rgba(255,215,120,0.95)");
g.addColorStop(0.7,"rgba(255,180,70,0.7)");
g.addColorStop(1,"rgba(255,160,50,0)");

ctx.beginPath();
ctx.arc(s.x,s.y,s.r*glow*6,0,Math.PI*2);
ctx.fillStyle=g;
ctx.fill();

});

stars.forEach(st=>{

st.pulse+=0.05;

const glow=1+Math.sin(st.pulse)*1;

const g=ctx.createRadialGradient(
st.x,st.y,0,
st.x,st.y,28*glow
);

g.addColorStop(0,"rgba(255,255,220,1)");
g.addColorStop(0.25,"rgba(255,220,120,1)");
g.addColorStop(0.6,"rgba(255,180,70,0.8)");
g.addColorStop(1,"rgba(255,150,40,0)");

ctx.beginPath();
ctx.arc(st.x,st.y,28*glow,0,Math.PI*2);
ctx.fillStyle=g;
ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
