<!DOCTYPE html>

<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Завеса в Мир Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:radial-gradient(circle at top,#fffdf7,#f5e6c5);
}

canvas{
position:absolute;
inset:0;
z-index:1;
}

.portal{
position:relative;
z-index:2;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.title{
font-family:'Cinzel',serif;
font-size:72px;
letter-spacing:0.16em;
color:#d6b45a;

text-shadow:
0 0 20px rgba(255,230,170,0.9),
0 0 40px rgba(255,210,140,0.6);

margin-bottom:20px;
}

.subtitle{
font-family:'Cormorant Garamond',serif;
font-size:28px;
color:#b79a63;

opacity:0;
animation:fade 2s forwards;
animation-delay:1.2s;

margin-bottom:45px;
}

.open{
font-family:'Cinzel',serif;
font-size:18px;
letter-spacing:0.12em;

padding:14px 34px;

border:1px solid rgba(212,175,55,0.6);
border-radius:40px;

background:rgba(255,255,255,0.2);

color:#cfa437;

cursor:pointer;

opacity:0;
animation:fade 2s forwards;
animation-delay:2s;

transition:0.4s;
}

.open:hover{

background:rgba(212,175,55,0.3);
box-shadow:0 0 20px rgba(212,175,55,0.6);

}

@keyframes fade{
to{opacity:1;}
}

</style>

</head>

<body>

<canvas id="veil"></canvas>

<div class="portal">

<div class="title">
Завеса в Мир Эни
</div>

<div class="subtitle">
путь звучит и раскрывается где бы ты ни был...
</div>

<button class="open">
ОТКРЫТЬ
</button>

</div>

<script>

const canvas = document.getElementById("veil");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

ctx.globalCompositeOperation="lighter";

let dust=[];
let fireflies=[];
let stars=[];



for(let i=0;i<200;i++){

dust.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

r:Math.random()*1.3+0.4,

a:Math.random()*Math.PI*2,
v:Math.random()*0.15+0.03

});

}



for(let i=0;i<26;i++){

fireflies.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

r:Math.random()*2+1,

a:Math.random()*Math.PI*2,
v:Math.random()*0.2+0.05,

pulse:Math.random()*Math.PI*2

});

}



for(let i=0;i<10;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

pulse:Math.random()*Math.PI*2

});

}



function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);



dust.forEach(p=>{

p.x+=Math.cos(p.a)*p.v;
p.y+=Math.sin(p.a)*p.v;

ctx.shadowBlur=8;
ctx.shadowColor="rgba(240,210,140,0.6)";

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

ctx.fillStyle="rgba(245,215,140,0.9)";
ctx.fill();

});



ctx.shadowBlur=0;



fireflies.forEach(f=>{

f.x+=Math.cos(f.a)*f.v;
f.y+=Math.sin(f.a)*f.v;

f.pulse+=0.05;

let glow=1+Math.sin(f.pulse)*0.5;

const g=ctx.createRadialGradient(

f.x,f.y,0,
f.x,f.y,f.r*glow*6

);

g.addColorStop(0,"rgba(255,248,225,0.9)");
g.addColorStop(0.4,"rgba(230,200,120,0.5)");
g.addColorStop(1,"rgba(200,170,100,0)");

ctx.beginPath();
ctx.arc(f.x,f.y,f.r*glow*6,0,Math.PI*2);

ctx.fillStyle=g;
ctx.fill();

});



stars.forEach(s=>{

s.pulse+=0.04;

let glow=1+Math.sin(s.pulse)*0.7;

const g=ctx.createRadialGradient(

s.x,s.y,0,
s.x,s.y,22*glow

);

g.addColorStop(0,"rgba(255,255,255,0.95)");
g.addColorStop(0.3,"rgba(235,240,245,0.6)");
g.addColorStop(1,"rgba(200,210,220,0)");

ctx.beginPath();
ctx.arc(s.x,s.y,22*glow,0,Math.PI*2);

ctx.fillStyle=g;
ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
