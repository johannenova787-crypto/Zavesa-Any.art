<!DOCTYPE html>

<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Завеса в Мир Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;

background:radial-gradient(circle at top,#fffdf7,#f3e6c9);

font-smoothing:antialiased;
}

canvas{
position:absolute;
inset:0;
z-index:1;
}

.portal{

position:relative;
z-index:2;

height:100%;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-align:center;

transition:2.5s opacity ease;

}

.title{

font-family:'Cinzel',serif;

font-size:72px;
letter-spacing:0.18em;

color:#d8b96a;

text-shadow:
0 0 25px rgba(255,230,170,0.9),
0 0 60px rgba(255,220,150,0.4);

opacity:0;
animation:fadeTitle 2.8s forwards;

}

.subtitle{

font-family:'Cormorant Garamond',serif;

font-size:28px;

margin-top:24px;

color:#b79a63;

opacity:0;

animation:fadeSubtitle 3s forwards;
animation-delay:2.6s;

}

.open{

margin-top:50px;

font-family:'Cinzel',serif;

font-size:18px;
letter-spacing:0.12em;

padding:14px 36px;

border-radius:40px;

border:1px solid rgba(212,175,55,0.6);

background:rgba(255,255,255,0.15);

color:#cda74e;

cursor:pointer;

opacity:0;

animation:fadeSubtitle 3s forwards;
animation-delay:4.2s;

transition:0.4s;

}

.open:hover{

background:rgba(212,175,55,0.25);
box-shadow:0 0 20px rgba(212,175,55,0.6);

}

@keyframes fadeTitle{
to{opacity:1}
}

@keyframes fadeSubtitle{
to{opacity:1}
}

</style>

</head>

<body>

<canvas id="veil"></canvas>

<div class="portal" id="portal">

<div class="title">
Завеса в Мир Эни
</div>

<div class="subtitle">
путь звучит и раскрывается где бы ты ни был…
</div>

<button class="open" onclick="openVeil()">
ОТКРЫТЬ
</button>

</div>

<script>

const canvas=document.getElementById("veil")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

let mouse={x:0,y:0}

window.addEventListener("mousemove",e=>{
mouse.x=e.clientX
mouse.y=e.clientY
})

ctx.globalCompositeOperation="lighter"

let fireflies=[]
let stars=[]
let dust=[]
let shootingStar=null



for(let i=0;i<180;i++){

dust.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

r:Math.random()*1.2+0.3,

a:Math.random()*Math.PI*2,
v:Math.random()*0.1+0.02

})

}



for(let i=0;i<24;i++){

fireflies.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

r:Math.random()*2+0.8,

a:Math.random()*Math.PI*2,
v:Math.random()*0.15+0.04,

pulse:Math.random()*Math.PI*2

})

}



for(let i=0;i<10;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
pulse:Math.random()*Math.PI*2

})

}



function createShootingStar(){

shootingStar={

x:Math.random()*canvas.width,
y:-20,

vx:-6,
vy:6,

life:0

}

}



setInterval(()=>{

createShootingStar()

},20000)



function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)



dust.forEach(p=>{

p.x+=Math.cos(p.a)*p.v
p.y+=Math.sin(p.a)*p.v

let dx=p.x-mouse.x
let dy=p.y-mouse.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<120){

p.x+=dx*0.02
p.y+=dy*0.02

}

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)

ctx.fillStyle="rgba(235,210,150,0.8)"
ctx.fill()

})



fireflies.forEach(f=>{

f.x+=Math.cos(f.a)*f.v
f.y+=Math.sin(f.a)*f.v

f.pulse+=0.05

let glow=1+Math.sin(f.pulse)*0.4

const g=ctx.createRadialGradient(
f.x,f.y,0,
f.x,f.y,f.r*glow*6
)

g.addColorStop(0,"rgba(255,248,220,0.9)")
g.addColorStop(0.4,"rgba(215,190,120,0.5)")
g.addColorStop(1,"rgba(200,170,100,0)")

ctx.beginPath()
ctx.arc(f.x,f.y,f.r*glow*6,0,Math.PI*2)

ctx.fillStyle=g
ctx.fill()

})



stars.forEach(s=>{

s.pulse+=0.04

let glow=1+Math.sin(s.pulse)*0.6

const g=ctx.createRadialGradient(
s.x,s.y,0,
s.x,s.y,20*glow
)

g.addColorStop(0,"rgba(255,255,255,0.95)")
g.addColorStop(0.3,"rgba(235,240,245,0.6)")
g.addColorStop(1,"rgba(200,210,220,0)")

ctx.beginPath()
ctx.arc(s.x,s.y,20*glow,0,Math.PI*2)

ctx.fillStyle=g
ctx.fill()

})



if(shootingStar){

shootingStar.x+=shootingStar.vx
shootingStar.y+=shootingStar.vy

shootingStar.life++

ctx.beginPath()
ctx.moveTo(shootingStar.x,shootingStar.y)
ctx.lineTo(shootingStar.x+60,shootingStar.y-60)

ctx.strokeStyle="rgba(255,255,255,0.8)"
ctx.lineWidth=2
ctx.stroke()

if(shootingStar.life>60){

shootingStar=null

}

}



requestAnimationFrame(draw)

}

draw()



function openVeil(){

const portal=document.getElementById("portal")

portal.style.opacity=0

setTimeout(()=>{

window.location.href="home.html"

},2200)

}

</script>

</body>
</html>
