<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Завеса в Мир Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:radial-gradient(circle at top,#fffaf0,#f2e3c6);
overflow:hidden;
font-family:'Cormorant Garamond',serif;
}

.veil-container{
position:relative;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

.veil{
position:absolute;
inset:0;
background:linear-gradient(
120deg,
rgba(255,255,255,0.35),
rgba(255,230,170,0.22),
rgba(255,255,255,0.55),
rgba(255,240,190,0.2)
);
background-size:300% 300%;
animation:veilFlow 18s ease-in-out infinite;
z-index:2;
transition:transform 3s ease,opacity 3s ease;
}

.veil.open{
transform:scaleX(0);
opacity:0;
}

@keyframes veilFlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.portal{
position:relative;
z-index:3;
text-align:center;
}

.portal-title{
font-size:clamp(52px,6vw,88px);
letter-spacing:0.14em;
color:#cfa437;

text-shadow:
0 0 14px rgba(255,210,120,0.8),
0 0 32px rgba(255,200,110,0.6);

margin-bottom:40px;
animation:titleGlow 6s ease-in-out infinite;
}

@keyframes titleGlow{
0%,100%{
text-shadow:
0 0 14px rgba(255,210,120,0.8),
0 0 32px rgba(255,200,110,0.6);
}

50%{
text-shadow:
0 0 26px rgba(255,230,150,1),
0 0 60px rgba(255,210,120,0.9);
}
}

.whisper{
margin-top:34px;
font-size:34px;
letter-spacing:0.14em;
color:#cfa437;
opacity:0;
animation:whisperAppear 6s ease forwards;
animation-delay:2s;
}

@keyframes whisperAppear{
to{opacity:1;}
}

.open-button{
font-size:26px;
letter-spacing:0.15em;
padding:18px 48px;
border-radius:60px;
border:1px solid rgba(200,160,80,0.7);
background:rgba(255,245,215,0.85);
color:#9c7a2f;
cursor:pointer;
transition:all 0.6s ease;
}

.open-button:hover{
transform:scale(1.05);
box-shadow:0 0 36px rgba(255,220,140,0.8);
}

canvas{
position:absolute;
inset:0;
z-index:1;
}
</style>

</head>

<body>

<audio id="veilSound" src="sound/veil.mp3" preload="auto"></audio>

<div class="veil-container">

<canvas id="particles"></canvas>

<div class="veil" id="veil"></div>

<div class="portal">
<div class="portal-title">Завеса в Мир Эни</div>

<button class="open-button" onclick="openVeil()">Открыть</button>

<div class="whisper">
Пусть звучит и раскрывается,<br>
где бы ты ни был…
</div>

</div>
</div>
