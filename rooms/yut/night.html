<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ют — Ночная комната</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cormorant Garamond',serif;
background:radial-gradient(circle at 50% 30%, #0e0d17, #020106 80%);
color:#e8ddc7;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* мягкие звезды */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:0.6;
animation:twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
0%,100%{opacity:0.2}
50%{opacity:0.9}
}

/* туман */

.mist{
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,rgba(255,255,255,0.04),transparent 70%);
animation:mistMove 40s linear infinite;
}

@keyframes mistMove{
0%{transform:translate(-10%,-10%)}
50%{transform:translate(10%,10%)}
100%{transform:translate(-10%,-10%)}
}

/* текст */

.room{
max-width:700px;
text-align:center;
padding:40px;
}

.line{
font-size:28px;
line-height:1.9;
opacity:0;
animation:fadeLine 2s forwards;
}

.line:nth-child(1){animation-delay:1s}
.line:nth-child(2){animation-delay:4s}
.line:nth-child(3){animation-delay:7s}
.line:nth-child(4){animation-delay:10s}

@keyframes fadeLine{
to{opacity:1}
}

/* возвращение */

.back{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
font-size:18px;
opacity:0.7;
}

.back a{
color:#e8ddc7;
text-decoration:none;
}

</style>
</head>

<body>

<div class="mist"></div>

<div class="room">

<div class="line">
Ночью Ют почти не говорит.
</div>

<div class="line">
Она слушает.
</div>

<div class="line">
Иногда кажется,
что ночь слушает её.
</div>

<div class="line">
И тогда тишина становится глубже,
чем пространство.
</div>

</div>

<div class="back">
<a href="../../world-map.html">Вернуться к карте</a>
</div>

<script>

/* создаём звезды */

for(let i=0;i<140;i++){

const s=document.createElement('div')

s.className='star'

s.style.left=Math.random()*100+'%'
s.style.top=Math.random()*100+'%'

s.style.animationDelay=Math.random()*4+'s'

document.body.appendChild(s)

}

</script>

</body>
</html>
