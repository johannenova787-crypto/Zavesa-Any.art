<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Мир Эни</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cormorant Garamond',serif;

background:
radial-gradient(circle at 50% 30%, #1a1924, #08070d 70%);

color:#e8ddc7;

display:flex;
align-items:center;
justify-content:center;

min-height:100vh;
text-align:center;
overflow:hidden;
}

.container{
max-width:800px;
padding:40px;
}

h1{
font-size:64px;
letter-spacing:0.12em;
margin-bottom:40px;
opacity:0;
animation:fadeIn 3s forwards;
}

.rooms{
display:flex;
flex-direction:column;
gap:22px;
}

.room{
opacity:0;
transform:translateY(20px);

padding:18px 36px;

border-radius:40px;

border:1px solid rgba(255,215,150,0.35);

background:rgba(20,18,28,0.5);

text-decoration:none;

color:#e8ddc7;

font-size:20px;

transition:0.5s;
}

.room:hover{
transform:scale(1.05);
box-shadow:0 0 30px rgba(255,215,150,0.35);
}

@keyframes fadeIn{
to{opacity:1;}
}

.appear{
animation:roomAppear 2s forwards;
}

@keyframes roomAppear{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.back{
margin-top:40px;
display:inline-block;
font-size:18px;
opacity:0.7;
text-decoration:none;
color:#e8ddc7;
}

.back:hover{
opacity:1;
}

</style>

</head>

<body>

<div class="container">

<h1>Мир Эни</h1>

<div class="rooms">

Дом Благоразумия
</a>

Фрагмент истории
</a>

<a class="room" id="r3" href="lake.html">
Озеро
</a>

<a class="room" id="r4" href="shadows.html">
Тени
</a>

</div>

<a class="back" href="../index.html">
Вернуться к Книге
</a>

</div>

<script>

function revealRooms(){

const ids=["r1","r2","r3","r4"]

ids.forEach((id,i)=>{

setTimeout(()=>{
document.getElementById(id).classList.add("appear")
},900+i*900)

})

}

setTimeout(revealRooms,1200)

</script>

</body>
</html>
