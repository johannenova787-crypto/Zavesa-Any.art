<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SI-EL</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:radial-gradient(circle at 50% 40%, #f5f6f8, #dfe2e8 70%);
font-family:'Cormorant Garamond',serif;
color:#6f7380;
overflow:hidden;
}

/* холодный туман */

.fog{
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle at 50% 40%, rgba(255,255,255,0.7), transparent 70%);
animation:fogMove 60s linear infinite;
}

@keyframes fogMove{
0%{transform:translate(0,0)}
50%{transform:translate(-120px,-80px)}
100%{transform:translate(0,0)}
}

/* частицы */

.particle{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.6;
animation:fall 18s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh)}
}

/* фигура света */

.si{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:220px;
height:420px;
background:radial-gradient(ellipse at center, rgba(255,255,255,0.95), rgba(255,255,255,0.2));
border-radius:120px;
filter:blur(12px);
animation:lightBreath 8s ease-in-out infinite;
transition:transform 0.6s;
}

@keyframes lightBreath{
0%{opacity:0.8;transform:translate(-50%,-50%) scale(1)}
50%{opacity:1;transform:translate(-50%,-50%) scale(1.04)}
100%{opacity:0.8;transform:translate(-50%,-50%) scale(1)}
}

/* текст */

.text{
position:absolute;
width:100%;
text-align:center;
font-size:24px;
letter-spacing:0.08em;
opacity:0;
}

.t1{top:18%;animation:fade 4s forwards;animation-delay:2s;}
.t2{top:22%;animation:fade 4s forwards;animation-delay:6s;}
.t3{top:26%;animation:fade 4s forwards;animation-delay:10s;}
.t4{top:30%;animation:fade 4s forwards;animation-delay:14s;}

@keyframes fade{
to{opacity:0.85}
}

/* поздняя фраза */

.reveal{
position:absolute;
bottom:18%;
width:100%;
text-align:center;
font-size:26px;
opacity:0;
transition:2s;
}

/* назад */

.back{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
font-size:18px;
opacity:0.6;
}

.back a{
color:#6f7380;
text-decoration:none;
}

</style>

</head>

<body>

<div class="fog"></div>

<div class="si" id="si"></div>

<div class="text t1">Здесь всё чисто.</div>
<div class="text t2">Ничто не тревожит пространство.</div>
<div class="text t3">Ни боль. Ни желание. Ни память.</div>
<div class="text t4">Свет Si-El совершенен.</div>

<div class="reveal" id="reveal">
Иногда чистота — это просто отсутствие жизни.
</div>

<div class="back">
<a href="../../world-map.html">Вернуться к карте</a>
</div>

<script>

/* частицы */

for(let i=0;i<80;i++){

const p=document.createElement("div")
p.className="particle"

p.style.left=Math.random()*100+"%"
p.style.animationDelay=Math.random()*18+"s"

document.body.appendChild(p)

}

/* свет отдаляется от курсора */

const si=document.getElementById("si")

document.addEventListener("mousemove",(e)=>{

const x=(e.clientX/window.innerWidth-0.5)*40
const y=(e.clientY/window.innerHeight-0.5)*40

si.style.transform=
"translate(calc(-50% - "+x+"px), calc(-50% - "+y+"px))"

})

/* поздняя фраза */

setTimeout(()=>{
document.getElementById("reveal").style.opacity=0.9
},16000)

</script>

</body>
</html>
