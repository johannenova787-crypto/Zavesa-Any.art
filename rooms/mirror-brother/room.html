<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Зеркальный Брат</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:radial-gradient(circle at 50% 35%, #161720, #040408 70%);
font-family:'Cormorant Garamond',serif;
color:#e8e4da;
overflow:hidden;
}

/* звёздная пыль */

.stars{
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:120px 120px;
opacity:0.25;
animation:starsMove 140s linear infinite;
}

@keyframes starsMove{
0%{transform:translate(0,0)}
100%{transform:translate(-500px,-400px)}
}

/* туман */

.fog{
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle at 40% 40%, rgba(255,255,255,0.05), transparent 60%);
animation:fogMove 90s linear infinite;
}

@keyframes fogMove{
0%{transform:translate(0,0)}
50%{transform:translate(-180px,-120px)}
100%{transform:translate(0,0)}
}

/* контейнер арта */

.mirrorRoom{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
opacity:0;
animation:roomAppear 4s forwards;
animation-delay:2s;
}

@keyframes roomAppear{
to{opacity:1}
}

/* сам арт */

.mirrorArt{
width:420px;
max-width:80vw;
border-radius:10px;
box-shadow:
0 0 60px rgba(200,200,220,0.25),
0 0 120px rgba(160,170,220,0.1);
transition:1s;
}

.mirrorArt:hover{
transform:scale(1.03);
box-shadow:
0 0 80px rgba(220,220,240,0.4),
0 0 160px rgba(160,170,220,0.2);
}

/* текст */

.text{
position:absolute;
width:100%;
text-align:center;
font-size:26px;
letter-spacing:0.1em;
opacity:0;
}

.t1{top:18%; animation:fadeText 4s forwards; animation-delay:3s;}
.t2{top:22%; animation:fadeText 4s forwards; animation-delay:7s;}
.t3{top:26%; animation:fadeText 4s forwards; animation-delay:11s;}

@keyframes fadeText{
to{opacity:0.9}
}

/* серебряные искры */

.spark{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white;
animation:sparkMove 16s linear infinite;
}

@keyframes sparkMove{
0%{transform:translateY(0)}
100%{transform:translateY(-800px)}
}

/* кнопка назад */

.back{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
font-size:18px;
opacity:0.7;
}

.back a{
color:#e8e4da;
text-decoration:none;
transition:0.3s;
}

.back a:hover{
opacity:1;
}

</style>

</head>

<body>

<div class="stars"></div>
<div class="fog"></div>

<div class="text t1">Иногда зеркало — это просто стекло.</div>
<div class="text t2">Иногда — память.</div>
<div class="text t3">Иногда — тот, кто смотрит изнутри.</div>

<div class="mirrorRoom">

<!-- ВСТАВЬ СВОЙ АРТ СЮДА -->

<img src="mirror-brother-art.jpg" class="mirrorArt">

</div>

<div class="back">
<a href="../../world-map.html">Вернуться к карте</a>
</div>

<script>

/* серебряные частицы */

for(let i=0;i<35;i++){

const s=document.createElement("div")

s.className="spark"

s.style.left=Math.random()*100+"%"
s.style.top=100+Math.random()*100+"%"

s.style.animationDelay=Math.random()*10+"s"

document.body.appendChild(s)

}

</script>

</body>
</html>
