<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Зеркальный Брат</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:radial-gradient(circle at 50% 35%, #171821, #040408 70%);
font-family:'Cormorant Garamond',serif;
color:#e8e4da;
overflow:hidden;
}

/* звёздная пыль */

.stars{
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:120px 120px;
opacity:0.25;
animation:starsMove 150s linear infinite;
}

@keyframes starsMove{
0%{transform:translate(0,0)}
100%{transform:translate(-600px,-500px)}
}

/* туман */

.fog{
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle at 40% 40%, rgba(255,255,255,0.05), transparent 60%);
animation:fogMove 100s linear infinite;
}

@keyframes fogMove{
0%{transform:translate(0,0)}
50%{transform:translate(-200px,-140px)}
100%{transform:translate(0,0)}
}

/* зеркало */

.mirror{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:460px;
max-width:80vw;
border-radius:14px;
overflow:hidden;
box-shadow:
0 0 60px rgba(200,200,220,0.3),
0 0 120px rgba(160,170,220,0.15);
animation:mirrorBreath 8s ease-in-out infinite;
}

@keyframes mirrorBreath{
0%{box-shadow:0 0 50px rgba(200,200,220,0.25)}
50%{box-shadow:0 0 100px rgba(220,220,240,0.45)}
100%{box-shadow:0 0 50px rgba(200,200,220,0.25)}
}

/* арт */

.mirror img{
width:100%;
display:block;
filter:contrast(1.05) brightness(0.95);
}

/* лёгкий стеклянный отблеск */

.glass{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
120deg,
transparent 20%,
rgba(255,255,255,0.12),
transparent 60%
);
animation:glassMove 8s linear infinite;
pointer-events:none;
}

@keyframes glassMove{
0%{transform:translateX(-100%)}
100%{transform:translateX(100%)}
}

/* текст */

.text{
position:absolute;
width:100%;
text-align:center;
font-size:26px;
letter-spacing:0.1em;
opacity:0;
}

.t1{top:16%;animation:fadeText 4s forwards;animation-delay:2s;}
.t2{top:20%;animation:fadeText 4s forwards;animation-delay:6s;}
.t3{top:24%;animation:fadeText 4s forwards;animation-delay:10s;}

@keyframes fadeText{
to{opacity:0.9}
}

/* серебряные частицы */

.spark{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white;
animation:sparkMove 18s linear infinite;
}

@keyframes sparkMove{
0%{transform:translateY(0)}
100%{transform:translateY(-900px)}
}

/* назад */

.back{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
font-size:18px;
opacity:0.7;
}

.back a{
color:#e8e4da;
text-decoration:none;
}

</style>

</head>

<body>

<div class="stars"></div>
<div class="fog"></div>

<div class="text t1">Он не был создан.</div>
<div class="text t2">Он появился, когда кто-то посмотрел в зеркало слишком долго.</div>
<div class="text t3">И зеркало посмотрело в ответ.</div>

<div class="mirror">

<img src="mirror-brother.jpg">

<div class="glass"></div>

</div>

<div class="back">
<a href="../../world-map.html">Вернуться к карте</a>
</div>

<script>

/* серебряная пыль */

for(let i=0;i<40;i++){

const s=document.createElement("div")
s.className="spark"

s.style.left=Math.random()*100+"%"
s.style.top=100+Math.random()*100+"%"

s.style.animationDelay=Math.random()*12+"s"

document.body.appendChild(s)

}

</script>

</body>
</html>

}

</script>

</body>
</html>
