<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Комната Кота</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:#e8e8e8;
font-family:'Cormorant Garamond',serif;
overflow:hidden;
}

/* КУРСОР-ИСКРА */

.sparkCursor{
position:fixed;
width:8px;
height:8px;
background:white;
border-radius:50%;
pointer-events:none;
box-shadow:0 0 12px white;
z-index:9999;
}

/* звезды */

.stars{
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:80px 80px;
animation:starsMove 120s linear infinite;
opacity:0.35;
}

@keyframes starsMove{
0%{transform:translate(0,0)}
100%{transform:translate(-400px,-400px)}
}

/* туман */

.fog{
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle at 40% 40%,rgba(255,255,255,0.05),transparent 60%);
animation:fogMove 70s linear infinite;
}

@keyframes fogMove{
0%{transform:translate(0,0)}
50%{transform:translate(-150px,-80px)}
100%{transform:translate(0,0)}
}

/* КОТ */

.cat{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
opacity:0;
animation:catAppear 6s forwards;
animation-delay:4s;
}

@keyframes catAppear{
to{opacity:0.9}
}

/* хвост */

.tail{
transform-origin:0% 50%;
animation:tailMove 6s ease-in-out infinite;
}

@keyframes tailMove{
0%{transform:rotate(0deg)}
50%{transform:rotate(8deg)}
100%{transform:rotate(0deg)}
}

/* лапа */

.paw{
transform-origin:50% 50%;
animation:pawIdle 8s infinite;
}

@keyframes pawIdle{
0%{transform:rotate(0deg)}
50%{transform:rotate(-5deg)}
100%{transform:rotate(0deg)}
}

.pawCatch{
animation:pawCatchMove 0.8s forwards;
}

@keyframes pawCatchMove{
0%{transform:rotate(0deg)}
50%{transform:rotate(-40deg)}
100%{transform:rotate(0deg)}
}

/* глаза */

.eye{
fill:#ffd86a;
filter:drop-shadow(0 0 8px #ffd86a);
transition:transform 0.2s;
}

/* текст */

.container{
position:absolute;
top:30%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
max-width:600px;
}

p{
font-size:26px;
line-height:1.6;
opacity:0;
animation:fadeIn 4s forwards;
}

p:nth-child(1){animation-delay:1s}
p:nth-child(2){animation-delay:4s}
p:nth-child(3){animation-delay:7s}
p:nth-child(4){animation-delay:10s}

@keyframes fadeIn{
to{opacity:0.9}
}

/* сообщение */

.message{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:30px;
opacity:0;
color:#f0d8a8;
pointer-events:none;
}

.show{
animation:messageShow 4s forwards;
}

@keyframes messageShow{
0%{opacity:0}
20%{opacity:1}
80%{opacity:1}
100%{opacity:0}
}

/* СИЛУЭТ ЮТ */

.yut{
position:fixed;
top:20%;
left:60%;
width:120px;
height:200px;
background:linear-gradient(transparent,rgba(255,255,255,0.15),transparent);
opacity:0;
filter:blur(3px);
animation:yutAppear 40s infinite;
}

@keyframes yutAppear{
0%{opacity:0}
45%{opacity:0}
50%{opacity:0.25}
60%{opacity:0}
100%{opacity:0}
}

/* кнопка */

.back{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
text-decoration:none;
color:#ccc;
font-size:18px;
opacity:0.7;
}

.back:hover{
opacity:1;
}

</style>

</head>

<body>

<div class="sparkCursor" id="cursor"></div>

<div class="stars"></div>
<div class="fog"></div>

<div class="yut"></div>

<div class="container">

<p>Здесь живёт Кот.</p>
<p>Он не принадлежит этому дому.</p>
<p>Иногда он просто наблюдает.</p>
<p>Иногда — забирает искры.</p>

</div>

<svg class="cat" width="600" height="360" viewBox="0 0 260 160">

<ellipse cx="130" cy="110" rx="80" ry="40" fill="#070707"/>
<circle cx="70" cy="80" r="30" fill="#070707"/>

<polygon points="50,60 60,35 70,60" fill="#070707"/>
<polygon points="70,60 85,35 90,60" fill="#070707"/>

<circle class="eye" id="eye1" cx="60" cy="80" r="4"/>
<circle class="eye" id="eye2" cx="80" cy="80" r="4"/>

<rect class="tail" x="200" y="95" width="60" height="8" rx="4" fill="#070707"/>

<rect class="paw" id="paw" x="120" y="105" width="30" height="8" rx="4" fill="#070707"/>

</svg>

<div class="message" id="catMessage">
Эта искра когда-то принадлежала Ют.
</div>

<a class="back" href="../../world-map.html">← Вернуться в мир Эни</a>

<script>

/* курсор-искра */

const cursor=document.getElementById("cursor")

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

/* глаза следят за искрой */

document.addEventListener("mousemove", function(e){

let eyes=document.querySelectorAll(".eye")

eyes.forEach(eye=>{
let rect=eye.getBoundingClientRect()

let x=(e.clientX-rect.left)/50
let y=(e.clientY-rect.top)/50

eye.style.transform="translate("+x+"px,"+y+"px)"

})

})

/* кот ловит искру */

setInterval(()=>{

let paw=document.getElementById("paw")
let msg=document.getElementById("catMessage")

paw.classList.add("pawCatch")
msg.classList.add("show")

setTimeout(()=>{
paw.classList.remove("pawCatch")
msg.classList.remove("show")
},2000)

},20000)

</script>

</body>
</html>
